ws with power and command at the same time, which is rare, and has the competitive mentality that the best pitchers in the sport always seem to share. She entered the professional game in 2022 as one of its most anticipated young arms.","storyRight":"","_sport":""},{"fullName":"Kerri Walsh Jennings","sport":"Volleyball","legend":"Yes","story":"Kerri Walsh Jennings and Misty May-Treanor are the most decorated partnership in beach volleyball history. Together they won three consecutive Olympic gold medals — Athens 2004, Beijing 2008, London 2012 — going undefeated in all three tournaments with a combined record of 21-0 in Olympic play.","timeline":"2004 Wins Olympic gold in Athens — first of three consecutive\n2008 Wins Olympic gold in Beijing, completing a 112-match win streak\n2012 Wins third consecutive Olympic gold in London\n2016 Wins Olympic bronze with new partner April Ross","awards":"Individual Awards\n3x Olympic Gold Medal\n1x Olympic Bronze Medal\nTeam & Competition\n3x Olympic Champion with Misty May-Treanor","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Beach Volleyball — Outside Hitter","era":"Legacy","teams":"","college":"","hometown":"Santa Clara, California","nationality":"American","yearsActive":"1999–present","jerseyNumber":"10","espnUrl":"https://www.espn.com/olympics/athlete/_/id/2470740/kerri-walsh-jennings","instagram":"kerri_walsh","initials":"Kw","slug":"kerri-walsh-jennings","proTitle":"Beach Volleyball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Kerri_Walsh_Jennings_2012.jpg/440px-Kerri_Walsh_Jennings_2012.jpg","heroImageAlt":"Kerri Walsh Jennings at the 2012 London Olympics — three-time Olympic gold medalist and beach volleyball legend","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Walsh Jennings continued competing after May-Treanor retired, winning bronze at the 2016 Rio Games and attempting multiple further Olympic cycles into her forties. She also built p1440, a beach volleyball professional tour designed to give the sport's best players more sustainable careers.","storyRight":"She is 6'2\" and plays with a combination of power and athleticism that defines what the sport looks like when executed perfectly.","_sport":""},{"fullName":"Misty May-Treanor","sport":"Volleyball","legend":"Yes","story":"Misty May-Treanor is the defensive half of the most successful partnership in beach volleyball history. Alongside Kerri Walsh Jennings she won three consecutive Olympic gold medals, going undefeated in Olympic play across three tournaments.","timeline":"2004 Wins first Olympic gold in Athens\n2008 Tears Achilles — recovers to win second Olympic gold in Beijing\n2012 Wins third consecutive Olympic gold in London, retires","awards":"Individual Awards\n3x Olympic Gold Medal\nTeam & Competition\n3x Olympic Champion with Kerri Walsh Jennings","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Beach Volleyball — Setter / Digger","era":"Legacy","teams":"","college":"","hometown":"Los Angeles, California","nationality":"American","yearsActive":"1999–2012","jerseyNumber":"10","espnUrl":"","instagram":"mistymaytreador","initials":"Mm","slug":"misty-may-treanor","proTitle":"Beach Volleyball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Misty_May-Treanor_2008.jpg/440px-Misty_May-Treanor_2008.jpg","heroImageAlt":"Misty May-Treanor at the 2008 Beijing Olympics — three-time Olympic gold medalist and greatest beach volleyball player of all time","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"May-Treanor's game was built on defense and precision. Her passing, setting, and court coverage were the foundation that Walsh Jennings's attacking game was built on. She came back from a torn Achilles tendon suffered during a Dancing with the Stars rehearsal in 2008 to compete in the London Olympics and win her third gold. She retired from the top.","storyRight":"","_sport":""},{"fullName":"Jordan Larson","sport":"Volleyball","legend":"Yes","story":"Jordan Larson grew up on a farm in Hooper, Nebraska and became one of the most decorated volleyball players in American history. She was the cornerstone of the USA Women's National Team for over a decade — serving as captain through multiple Olympic cycles.","timeline":"2012 Wins Olympic silver medal in London\n2020 Wins Olympic gold medal at Tokyo Games\n2022 Wins Nations League gold with USA","awards":"Individual Awards\nFIVB World Championship All-Star Team\nTeam & Competition\nOlympic Gold Medal (2020)\nOlympic Silver Medal (2012)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Outside Hitter","era":"Legacy","teams":"","college":"","hometown":"Hooper, Nebraska","nationality":"American","yearsActive":"2009–present","jerseyNumber":"10","espnUrl":"","instagram":"jordanlarson10","initials":"Jl","slug":"jordan-larson","proTitle":"Professional Volleyball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Jordan_Larson.jpg/440px-Jordan_Larson.jpg","heroImageAlt":"Jordan Larson, USA Women's Volleyball captain and 2020 Tokyo Olympic gold medalist","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She won silver at the 2012 London Olympics and gold at the 2020 Tokyo Olympics, a nine-year wait between podium finishes that says everything about her commitment. She has also won league titles in Russia, Turkey, and China.","storyRight":"Larson was never the flashiest name on a roster but always the most consistent. The gold medal in Tokyo was built significantly on her contributions.","_sport":""},{"fullName":"Madisen Skinner","sport":"Volleyball","legend":"No","story":"Madisen Skinner is one of the most exciting young players in women's volleyball. She was a two-time national champion at the University of Texas before entering the international game, and won gold at the 2024 Paris Olympics as part of a USA team in generational transition.","timeline":"2022 Named NCAA champion with Texas\n2023 Named to USA Women's National Team\n2024 Wins Olympic gold at Paris Games","awards":"Individual Awards\n2x NCAA Champion with Texas\nTeam & Competition\nOlympic Gold Medal (2024)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Outside Hitter","era":"Rising","teams":"","college":"","hometown":"Austin, Texas","nationality":"American","yearsActive":"2022–present","jerseyNumber":"8","espnUrl":"","instagram":"madisennskinner","initials":"Ms","slug":"madisen-skinner","proTitle":"Professional Volleyball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/db/Madisen_Skinner_2022.jpg/440px-Madisen_Skinner_2022.jpg","heroImageAlt":"Madisen Skinner — University of Texas champion and 2024 Paris Olympics gold medalist","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She represents the future of American volleyball — a player who has grown up watching Jordan Larson set the standard and seems determined to carry it forward.","storyRight":"","_sport":""},{"fullName":"Diana Nyad","sport":"Swimming","legend":"Yes","story":"Diana Nyad is the only person in history to swim from Cuba to Florida without a shark cage. She completed the 110-mile crossing in September 2013 at age 64, after four failed attempts across five decades.","timeline":"1975 Sets world record for open water swimming from Bahamas to Florida\n1978 Attempts Cuba-Florida swim for the first time\n2013 Completes Cuba-Florida at age 64 — first person ever without a shark cage","awards":"Individual Awards\nUSA Swimming Hall of Fame\nLegacy\nFirst person to swim Cuba to Florida without a shark cage\nSubject of Netflix film Nyad (2023)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Open Water Swimming","era":"Legacy","teams":"","college":"","hometown":"Fort Lauderdale, Florida","nationality":"American","yearsActive":"1974–2013","jerseyNumber":"","espnUrl":"","instagram":"diananyad","initials":"Dn","slug":"diana-nyad","proTitle":"Open Water Swimmer","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Diana_Nyad_2013.jpg/440px-Diana_Nyad_2013.jpg","heroImageAlt":"Diana Nyad — the first and only person to swim from Cuba to Florida without a shark cage","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Nyad had first attempted the crossing in 1978 at age 29. She tried again in 2011, then twice in 2012, each time stopped by jellyfish, weather, or the physical limits of sustained cold water exposure. The 2013 crossing took 52 hours and 54 minutes.","storyRight":"When she walked out of the water in Key West she said three things: Never give up. You are never too old to chase your dreams. It looks like a solitary sport but it is a team effort. Her story was made into a Netflix film starring Annette Bening in 2023.","_sport":""},{"fullName":"Mikaela Shiffrin","sport":"Skiing","legend":"No","story":"Mikaela Shiffrin is the most decorated alpine ski racer in World Cup history — male or female — with over 97 wins. She broke Ingemar Stenmark's record that had stood since 1989 and has won Olympic gold medals in slalom and giant slalom.","timeline":"2013 Wins first World Cup slalom — youngest ever\n2014 Wins Olympic gold in slalom at Sochi\n2018 Wins Olympic gold in giant slalom at PyeongChang\n2023 Breaks Ingemar Stenmark's all-time World Cup wins record","awards":"Individual Awards\n97+ World Cup victories (all-time record)\n2x Olympic Gold Medal (2014, 2018)\n4x World Championship gold medals","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Alpine Skiing","era":"Current","teams":"","college":"","hometown":"Vail, Colorado","nationality":"American","yearsActive":"2011–present","jerseyNumber":"","espnUrl":"https://www.espn.com/olympics/athlete/_/id/2578062/mikaela-shiffrin","instagram":"mikaelashiffrin","initials":"Ms","slug":"mikaela-shiffrin","proTitle":"Professional Alpine Skier","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Mikaela_Shiffrin_2022.jpg/440px-Mikaela_Shiffrin_2022.jpg","heroImageAlt":"Mikaela Shiffrin — holder of the all-time World Cup wins record with over 97 victories","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Shiffrin grew up in Vail, Colorado, with parents who were both accomplished ski racers. She won her first World Cup race at 17 and her first Olympic medal at 18.","storyRight":"She has also been defined by what she has endured off the slopes — the sudden death of her father in 2020 and the intense public scrutiny that followed her withdrawal from multiple events at the 2022 Beijing Olympics. She returned, and continued winning.","_sport":""},{"fullName":"Nadia Comaneci","sport":"Gymnastics","legend":"Yes","story":"Nadia Comaneci was 14 years old when she changed gymnastics forever. At the 1976 Montreal Olympics she received the first perfect score of 10 in Olympic history — and then received six more. The scoreboard was not programmed to display a 10; it showed 1.00. The world understood anyway.","timeline":"1976 Scores first perfect 10 in Olympic history at the Montreal Games\n1976 Wins three Olympic gold medals at age 14\n1980 Wins two more Olympic gold medals in Moscow\n1989 Defects from Romania\n1996 Inducted into the International Gymnastics Hall of Fame","awards":"Individual Awards\n5 Olympic Gold Medals\n3 Olympic Silver Medals\n1 Olympic Bronze Medal\n9 World Championship medals\nFirst gymnast to score a perfect 10 in Olympic competition","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Artistic Gymnastics","era":"Legacy","teams":"","college":"","hometown":"Onești, Romania","nationality":"Romanian","yearsActive":"1971–1984","jerseyNumber":"","espnUrl":"","instagram":"nadiacomaneci10","initials":"Nc","slug":"nadia-comaneci","proTitle":"Professional Gymnast","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a0/Nadia_Comaneci_1976.jpg/440px-Nadia_Comaneci_1976.jpg","heroImageAlt":"Nadia Comaneci at the 1976 Montreal Olympics — the first gymnast to score a perfect 10","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She won three gold medals at Montreal and two more at the 1980 Moscow Olympics. In 1989 she defected from Romania, arriving in the United States with nothing.","storyRight":"Comaneci now lives in Norman, Oklahoma, married to gymnastics legend Bart Conner. She remains the symbol of perfection in a sport that once thought perfection was theoretical.","_sport":""},{"fullName":"Simone Biles","sport":"Gymnastics","legend":"No","story":"Simone Biles is the most decorated gymnast in history. She has won 37 World Championship medals and 7 Olympic medals. She has four skills named after her in the Code of Points — moves so difficult the sport had to create new categories to accommodate them.","timeline":"2013 Wins first World Championship all-around title\n2016 Wins four gold medals at Rio Olympics\n2021 Withdraws from Tokyo team final citing mental health concerns\n2024 Returns at Paris, wins gold in team and all-around at age 27","awards":"Individual Awards\n37 World Championship medals\n7 Olympic medals\n4 gymnastics skills named in Code of Points\nPresidential Medal of Freedom (2022)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Artistic Gymnastics","era":"Current","teams":"","college":"","hometown":"Spring, Texas","nationality":"American","yearsActive":"2011–present","jerseyNumber":"","espnUrl":"https://www.espn.com/olympics/athlete/_/id/3149391/simone-biles","instagram":"simonebiles","initials":"Sb","slug":"simone-biles","proTitle":"Professional Gymnast","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Simone_Biles_2016.jpg/440px-Simone_Biles_2016.jpg","heroImageAlt":"Simone Biles — the most decorated gymnast in history and the first to have four skills named after her","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She grew up in foster care in Spring, Texas, before being adopted by her maternal grandparents. At the 2020 Tokyo Olympics she withdrew from the team final citing mental health concerns — a decision that helped normalize athlete wellbeing conversations across all of sports. She returned at the 2024 Paris Olympics, where she won gold in the team competition and the all-around at age 27.","storyRight":"Biles has also been one of the most important voices in the reckoning over Larry Nassar, the USA Gymnastics doctor who abused hundreds of athletes. She has refused to let the sport move past it without accountability.","_sport":""},{"fullName":"Ronda Rousey","sport":"MMA","legend":"No","story":"Ronda Rousey didn't just open the door for women in combat sports. She kicked it off its hinges. Before her, women's MMA was a marginal concern. After her, it was a centerpiece of the UFC's business model.","timeline":"2008 Wins Olympic bronze in judo at Beijing\n2012 Becomes first Strikeforce Women's Bantamweight Champion\n2013 Becomes inaugural UFC Women's Bantamweight Champion\n2015 Suffers first defeat against Holly Holm\n2018 Inducted into the UFC Hall of Fame","awards":"Individual Awards\nOlympic Bronze Medal, Judo (2008)\nFirst UFC Women's Bantamweight Champion\nUFC Hall of Fame (2018)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Mixed Martial Arts / Judo","era":"Legacy","teams":"","college":"","hometown":"Riverside, California","nationality":"American","yearsActive":"2004–2019","jerseyNumber":"","espnUrl":"https://www.espn.com/mma/fighter/_/id/2507537/ronda-rousey","instagram":"rondarousey","initials":"Rr","slug":"ronda-rousey","proTitle":"Professional MMA Fighter","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/Ronda_Rousey_2015.jpg/440px-Ronda_Rousey_2015.jpg","heroImageAlt":"Ronda Rousey — first female UFC champion and the athlete who opened women's MMA to the world","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She started as a judoka — winning Olympic bronze at the 2008 Beijing Games — and transitioned to MMA. Her armbar was so fast and technically perfect that most fights ended in under a minute. She became the first UFC Women's Bantamweight Champion and defended the title six times.","storyRight":"Her defeats to Holly Holm and Amanda Nunes were shattering in proportion to her prior dominance. She retired in 2019 having changed the sport permanently. Everything that followed for women in combat sports — the pay, the cards, the visibility — runs through what she built.","_sport":""},{"fullName":"Katie Ledecky","sport":"Swimming","legend":"No","story":"Katie Ledecky is the greatest distance swimmer in history. She holds world records in the 400m, 800m, and 1500m freestyle and has won more Olympic gold medals than any other American female swimmer.","timeline":"2012 Wins Olympic gold in the 800m at London at age 15\n2016 Wins four gold medals at Rio Olympics\n2021 Wins two gold medals at Tokyo Olympics\n2024 Wins 800m and 1500m at Paris — becomes most decorated American female swimmer","awards":"Individual Awards\n14 Olympic medals\n21 World Championship gold medals\nWorld records in 400m, 800m, and 1500m freestyle","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Swimming — Distance Freestyle","era":"Current","teams":"","college":"","hometown":"Bethesda, Maryland","nationality":"American","yearsActive":"2012–present","jerseyNumber":"","espnUrl":"https://www.espn.com/olympics/athlete/_/id/3149396/katie-ledecky","instagram":"katieledecky","initials":"Kl","slug":"katie-ledecky","proTitle":"Professional Swimmer","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Katie_Ledecky_2019.jpg/440px-Katie_Ledecky_2019.jpg","heroImageAlt":"Katie Ledecky — most decorated American female swimmer in Olympic history and holder of multiple world records","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"What distinguishes Ledecky is not just her times — though they are extraordinary — but the way she swims. She builds throughout a race and accelerates late. At the 2024 Paris Olympics she won the 800m and 1500m and became the most decorated American female Olympian in swimming history.","storyRight":"She graduated from Stanford with a degree in political science while continuing to set world records.","_sport":""},{"fullName":"Allyson Felix","sport":"Track & Field","legend":"No","story":"Allyson Felix is the most decorated American track and field athlete in Olympic history. She won 11 Olympic medals across five Games including seven gold, and dominated the 200m and 400m for over a decade.","timeline":"2004 Wins silver at Athens Olympics in 200m\n2012 Wins gold in 200m and relay at London\n2018 Publishes NYT op-ed about Nike maternity policy — changes industry\n2020 Becomes most decorated American track and field Olympian at Tokyo\n2022 Retires after World Championships","awards":"Individual Awards\n11 Olympic medals\n13 World Championship gold medals\nLegacy\nAdvocacy for athlete maternity rights leading to industry-wide policy changes","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Sprints — 100m, 200m, 400m","era":"Legacy","teams":"","college":"","hometown":"Los Angeles, California","nationality":"American","yearsActive":"2003–2022","jerseyNumber":"","espnUrl":"https://www.espn.com/olympics/athlete/_/id/2991788/allyson-felix","instagram":"allysonfelix","initials":"Af","slug":"allyson-felix","proTitle":"Professional Track & Field Athlete","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Allyson_Felix_2016.jpg/440px-Allyson_Felix_2016.jpg","heroImageAlt":"Allyson Felix at the 2016 Rio Olympics — most decorated American track and field athlete in Olympic history","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"In 2018 she went public in The New York Times about Nike reducing her pay by 70 percent during her pregnancy. The article sparked a national conversation about maternity rights for female athletes and led to significant policy changes across major sportswear companies.","storyRight":"Felix retired after the 2022 World Championships, having built her own shoe company, Saysh, and left the sport not just as its greatest champion but as someone who changed what female athletes could expect when they became mothers.","_sport":""},{"fullName":"Ann Meyers Drysdale","sport":"Basketball","legend":"Yes","story":"Ann Meyers Drysdale (born Ann Elizabeth Meyers; March 26, 1955) is an American retired pro basketball player and a sportscaster. She was a standout player in high school, college, the Olympic Games, international tournaments, and at professional levels.","timeline":"Ann Meyers Drysdale (born Ann Elizabeth Meyers; March 26, 1955) is an American retired pro basketball player and a sportscaster.","awards":"Individual Awards\nNaismith Memorial Basketball Hall of Fame (1993)\nWomen's Basketball Hall of Fame (1999)\nOlympic Silver Medal (1976)","wikiUrl":"https://en.wikipedia.org/wiki/Ann_Meyers","wikiPhoto":"","gettyUrl":"https://www.gettyimages.com/photos/Ann+Meyers+Drysdale","position":"Shooting guard","era":"Legacy","teams":"United States women's national basketball team","college":"UCLA (1974–1978)","hometown":"San Diego, California, U.S.","nationality":"American","yearsActive":"1978–1981","jerseyNumber":"15","espnUrl":"","instagram":"","initials":"Am","slug":"ann-meyers-drysdale","proTitle":"Basketball Player & Executive","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Ann_Meyers_Drysdale.jpg/440px-Ann_Meyers_Drysdale.jpg","heroImageAlt":"Ann Meyers Drysdale — first woman to sign an NBA contract and co-founder of the women's college basketball scholarship era","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Meyers was the first player to be part of the U.S. national team while still in high school.","storyRight":"She was the first woman signed to a four-year college athletic scholarship, at UCLA. She was also the first woman to sign a contract with a National Basketball Association team (the Indiana Pacers), in 1979.","_sport":""},{"fullName":"Nancy Lieberman","sport":"Basketball","legend":"Yes","story":"Nancy Ilizabeth Lieberman (born July 1, 1958), nicknamed \"Lady Magic\", is an American former professional basketball player and coach in the Women's National Basketball Association (WNBA), who is a broadcaster for the Oklahoma City Thunder of the National Basketball Association (NBA) as well as the head coach of Power, a team in the BIG3 which she led to its 2018 Championship. Lieberman is regarded as one of the greatest figures in American women's basketball.","timeline":"Nancy Ilizabeth Lieberman (born July 1, 1958), nicknamed \"Lady Magic\", is an American former professional basketball player and coach in the Women's National Basketball Association (WNBA), who is a broadcaster for the Oklahoma City Thunder of the National Basketball Association (NBA) as well as the head coach of Power, a team in the BIG3 which she led to its 2018 Championship.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Nancy_Lieberman","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/9/93/Nancy_Lieberman_by_Gage_Skidmore_2.jpg","gettyUrl":"https://www.gettyimages.com/photos/Nancy+Lieberman","position":"Point guard","era":"Legacy","teams":"Phoenix Mercury, Detroit Shock","college":"Old Dominion (1976–1980)","hometown":"Brooklyn, New York, U.S.","nationality":"American","yearsActive":"1980–1987, 1997, 2008","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/stats/_/id/261/nancy-lieberman","instagram":"nancylieberman","initials":"Nl","slug":"nancy-lieberman","proTitle":"Basketball Player & Coach","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/9/93/Nancy_Lieberman_by_Gage_Skidmore_2.jpg","heroImageAlt":"Nancy Lieberman — Lady Magic, Basketball Hall of Famer and pioneer who played with and against men","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"In 2000, she was inducted into the Nassau County Sports Hall of Fame. Lieberman is a member of the Naismith Memorial Basketball Hall of Fame, the Women's Basketball Hall of Fame, the St.","storyRight":"Louis Jewish Sports Hall of Fame, the Virginia Sports Hall of Fame, and the International Sports Hall of Fame.","_sport":""},{"fullName":"Katrina McClain","sport":"Basketball","legend":"Yes","story":"Katrina McClain was one of the most dominant post players in the history of women's basketball. She won two Olympic gold medals — in 1988 and 1996 — and was one of the anchors of the powerhouse USA Basketball teams that defined the late 1980s and early 1990s.","timeline":"1987 Named Wade Trophy winner\n1988 Wins Olympic gold in Seoul\n1996 Wins Olympic gold in Atlanta\n2006 Inducted into Women's Basketball Hall of Fame","awards":"Individual Awards\nWade Trophy (1987)\n2x Olympic Gold Medal (1988, 1996)\nWomen's Basketball Hall of Fame (2006)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Power Forward / Center","era":"Legacy","teams":"","college":"","hometown":"Charleston, South Carolina","nationality":"American","yearsActive":"1987–2001","jerseyNumber":"8","espnUrl":"","instagram":"","initials":"Km","slug":"katrina-mcclain","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Katrina_McClain.jpg/440px-Katrina_McClain.jpg","heroImageAlt":"Katrina McClain — two-time Olympic gold medalist and Women's Basketball Hall of Famer","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"McClain represents a generation of women who competed at the highest level without the visibility or compensation that would come a decade later. They built the foundation the WNBA was built on.","storyRight":"","_sport":""},{"fullName":"Marissa Coleman","sport":"Basketball","legend":"Yes","story":"Marissa Coleman was one of the most consistent forwards of her WNBA generation. A product of the University of Maryland, she played 11 seasons in the WNBA with the Washington Mystics, Los Angeles Sparks, and Indiana Fever, known for her athleticism, scoring ability, and versatility on the wing.","timeline":"Marissa Coleman (born January 4, 1987) is an American former professional basketball player.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Marissa_Coleman","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/d/da/Marissa_Coleman_WNBA.jpg","gettyUrl":"https://www.gettyimages.com/photos/Marissa+Coleman","position":"Small forward / shooting guard","era":"Legacy","teams":"Washington Mystics, Los Angeles Sparks, Indiana Fever","college":"Maryland (2005–2009)","hometown":"Portland, Oregon, U.S.","nationality":"American","yearsActive":"2009–2020","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/835/marissa-coleman","instagram":"","initials":"Mc","slug":"marissa-coleman","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/d/da/Marissa_Coleman_WNBA.jpg","heroImageAlt":"Marissa Coleman in her WNBA uniform — former Washington Mystics and Indiana Fever forward","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She was part of the Indiana Fever's 2012 WNBA championship team, contributing as a key rotation player to the franchise's first and only title. Her career spanned the transition between generations of WNBA stars, and she was respected throughout the league for her work ethic and professionalism.","storyRight":"After retiring from playing, Coleman has remained connected to the game as an ambassador for women's basketball.","_sport":""},{"fullName":"Rebecca Lobo","sport":"Basketball","legend":"Yes","story":"Rebecca Lobo was the most famous women's basketball player in America before there was a WNBA. She led UConn to its first national championship in 1995, won every game that season, and was on David Letterman. She was invited to the White House by President Clinton.","timeline":"1995 Leads UConn to undefeated national championship\n1996 Wins Olympic gold in Atlanta\n1997 Signs with NY Liberty as one of WNBA's original players\n2017 Inducted into Women's Basketball Hall of Fame","awards":"Individual Awards\nNaismith Award (1995)\nOlympic Gold Medal (1996)\nWomen's Basketball Hall of Fame (2017)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Center / Forward","era":"Legacy","teams":"","college":"","hometown":"Southwick, Massachusetts","nationality":"American","yearsActive":"1995–2003","jerseyNumber":"50","espnUrl":"https://www.espn.com/wnba/player/_/id/37/rebecca-lobo","instagram":"rebecca_lobo","initials":"Rl","slug":"rebecca-lobo","proTitle":"Basketball Player & Broadcaster","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Rebecca_Lobo_2013.jpg/440px-Rebecca_Lobo_2013.jpg","heroImageAlt":"Rebecca Lobo — 1995 UConn national champion, Olympic gold medalist, and ESPN basketball analyst","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She won gold at the 1996 Atlanta Olympics as a founding member of the team that made women's basketball viable as a professional product in the United States. She was one of the original players signed to the WNBA when the league launched in 1997.","storyRight":"A torn ACL cost her what might have been her peak seasons. She has spent the years since as one of ESPN's most respected analysts.","_sport":""},{"fullName":"Dawn Staley","sport":"Basketball","legend":"Yes","story":"Dawn Michelle Staley (born May 4, 1970) is an American basketball coach and former player who is the head coach for the South Carolina Gamecocks women's basketball team. A point guard, she played college basketball for the Virginia Cavaliers and spent eight seasons in the Women's National Basketball Association (WNBA), primarily with the Charlotte Sting.","timeline":"Dawn Michelle Staley (born May 4, 1970) is an American basketball coach and former player who is the head coach for the South Carolina Gamecocks women's basketball team.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Dawn_Staley","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/6/62/Dawn_Staley_Headshot_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Dawn+Staley","position":"Point guard","era":"Legacy","teams":"Charlotte Sting, Houston Comets, United States women's national basketball team","college":"Virginia (1988–1992)","hometown":"Philadelphia, Pennsylvania, U.S.","nationality":"American","yearsActive":"1996–2006","jerseyNumber":"5","espnUrl":"https://www.espn.com/wnba/player/bio/_/id/375/dawn-staley","instagram":"","initials":"Ds","slug":"dawn-staley","proTitle":"Basketball Player & Head Coach","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/6/62/Dawn_Staley_Headshot_%28cropped%29.jpg","heroImageAlt":"Dawn Staley — head coach of South Carolina Gamecocks and three-time Olympic gold medalist","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Staley also played on the United States women's national basketball team, winning three gold medals at the Olympic Games from 1996 to 2004, and was the head coach of the team that won an Olympic gold medal in 2021. Widely considered to be one of the greatest players and coaches in the history of the sport, she is the only person to win the Naismith Award as both a player and a coach.","storyRight":"During her college career with Virginia from 1988 to 1992, Staley set the NCAA record for steals, the school record for points, and the ACC record for assists. She played professionally in the American Basketball League (ABL) during its three years of operation before being selected ninth overall by the Sting in the 1999 WNBA draft.","_sport":""},{"fullName":"Diana Taurasi","sport":"Basketball","legend":"Yes","story":"Diana Lorena Taurasi (born June 11, 1982) is an Argentine-American former professional basketball player. She played 20 seasons in the Women's National Basketball Association (WNBA), spending her entire WNBA career with the Phoenix Mercury.","timeline":"Diana Lorena Taurasi (born June 11, 1982) is an Argentine-American former professional basketball player.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Diana_Taurasi","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/e/e9/Diana_Taurasi_2024_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Diana+Taurasi","position":"Shooting guard / Point guard","era":"Legacy","teams":"Phoenix Mercury","college":"UConn (2000–2004)","hometown":"Glendale, California, U.S.","nationality":"American","yearsActive":"2004–2024","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/1107/diana-taurasi","instagram":"dianataurasi","initials":"DT","slug":"diana-taurasi","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/e/e9/Diana_Taurasi_2024_%28cropped%29.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"A global basketball icon, Taurasi helped grow the visibility of the women's game and is credited with elevating the standard of play in the WNBA. She is often considered the greatest player in women's basketball history and holds the all-time WNBA scoring record.","storyRight":"She is the most decorated Olympic athlete in any team sport, winning six Olympic gold medals with the United States women's national basketball team. Taurasi was the top recruit in her class and earned national player of the year honors at Don Antonio Lugo High School in her hometown of Chino, California.","_sport":""},{"fullName":"Sue Bird","sport":"Basketball","legend":"Yes","story":"Suzanne Brigit Bird (born October 16, 1980) is an American former professional basketball player who played her entire career with the Seattle Storm of the Women's National Basketball Association (WNBA). Bird was drafted first overall pick by the Storm in the 2002 WNBA draft and is considered one of the greatest players in WNBA history.","timeline":"Suzanne Brigit Bird (born October 16, 1980) is an American former professional basketball player who played her entire career with the Seattle Storm of the Women's National Basketball Association (WNBA).","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Sue_Bird","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/b/be/SXSW-2024-alih-OB7A0246-Sue_Bird.jpg","gettyUrl":"https://www.gettyimages.com/photos/Sue+Bird","position":"Point guard","era":"Legacy","teams":"Seattle Storm","college":"UConn (1998–2002)","hometown":"Syosset, New York, U.S.","nationality":"American / Israeli","yearsActive":"2002–2022","jerseyNumber":"10","espnUrl":"https://www.espn.com/wnba/player/_/id/91/sue-bird","instagram":"sbird10","initials":"SB","slug":"sue-bird","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/b/be/SXSW-2024-alih-OB7A0246-Sue_Bird.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"As of 2025, Bird is the only WNBA player to win titles in three different decades. In 2025 she was inducted into the Women's Basketball Hall of Fame and the Naismith Basketball Hall of Fame, and in 2026 she was inducted into the NYC Basketball Hall of Fame and the FIBA Hall of Fame.","storyRight":"In addition to her WNBA career, Bird played for three teams in the Russian league. In high school, Bird was the New York State Player of the Year, the New York Daily News Player of the Year, and a WBCA All-American.","_sport":""},{"fullName":"Caitlin Clark","sport":"Basketball","legend":"No","story":"Caitlin Elizabeth Clark (born January 22, 2002) is an American professional basketball player for the Indiana Fever of the Women's National Basketball Association (WNBA). Regarded as one of the greatest female collegiate players, Clark was twice named national college basketball player of the year while playing for the Iowa Hawkeyes; she remains the NCAA Division I all-time leading scorer.","timeline":"Caitlin Elizabeth Clark (born January 22, 2002) is an American professional basketball player for the Indiana Fever of the Women's National Basketball Association (WNBA).","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Caitlin_Clark","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/e/e5/Caitlin_Clark_2025_2_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Caitlin+Clark","position":"Point guard","era":"Rising","teams":"Indiana Fever","college":"Iowa (2020–2024)","hometown":"Des Moines, Iowa, U.S.","nationality":"American","yearsActive":"2024–present","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/4433403/caitlin-clark","instagram":"caitlinclark22","initials":"CC","slug":"caitlin-clark","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/e/e5/Caitlin_Clark_2025_2_%28cropped%29.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Known for her shooting range, playmaking, and flair, she has helped popularize women's basketball, a phenomenon dubbed the \"Caitlin Clark effect\". Clark attended Dowling Catholic High School in her hometown of West Des Moines, Iowa, where she was named a McDonald's All-American and rated the fourth-best player in her class by ESPN.","storyRight":"In her freshman season with Iowa, she led the NCAA Division I in scoring and earned All-American honors. As a sophomore, Clark became the first women's player to lead Division I in points and assists in a single season.","_sport":""},{"fullName":"Elena Delle Donne","sport":"Basketball","legend":"Yes","story":"Elena Delle Donne (born September 5, 1989) is an American former professional basketball player. Delle Donne played college basketball for the Delaware Blue Hens from 2009 to 2013.","timeline":"Elena Delle Donne (born September 5, 1989) is an American former professional basketball player.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Elena_Delle_Donne","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/d/d9/20140814_Elena_Delle_Donne_2.jpg","gettyUrl":"https://www.gettyimages.com/photos/Elena+Delle+Donne","position":"Small forward / shooting guard","era":"Legacy","teams":"Chicago Sky, Washington Mystics","college":"Delaware (2009–2013)","hometown":"Wilmington, Delaware, U.S.","nationality":"American","yearsActive":"2013–2023","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/2491877/elena-delle-donne","instagram":"de11edonne","initials":"ED","slug":"elena-delle-donne","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/d/d9/20140814_Elena_Delle_Donne_2.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She was drafted by the Chicago Sky with the second overall pick of the 2013 WNBA draft, and led the Sky to the 2014 WNBA Finals, where they were defeated by the Phoenix Mercury. Delle Donne was traded to the Washington Mystics in 2017 and led them to their first WNBA championship in 2019.","storyRight":"She will be inducted into the Naismith Basketball Hall of Fame in 2026. Delle Donne has won two WNBA Most Valuable Player Awards (2015, 2019), been selected to seven All-Star teams, and was the first WNBA player to join the 50–40–90 club.","_sport":""},{"fullName":"Sylvia Fowles","sport":"Basketball","legend":"Yes","story":"Sylvia Shaqueria Fowles (born October 6, 1985) is an American professional basketball coach and former player who is an assistant coach for the Portland Fire of the Women's National Basketball Association (WNBA). She previously played for the Chicago Sky and Minnesota Lynx during her WNBA career.","timeline":"Sylvia Shaqueria Fowles (born October 6, 1985) is an American professional basketball coach and former player who is an assistant coach for the Portland Fire of the Women's National Basketball Association (WNBA).","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Sylvia_Fowles","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/0/00/Sylvia_Fowles_2022_%2852283271158%29_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Sylvia+Fowles","position":"Center","era":"Current","teams":"Chicago Sky","college":"LSU (2004–2008)","hometown":"Miami, Florida, U.S.","nationality":"American","yearsActive":"2008–2022","jerseyNumber":"34","espnUrl":"https://www.espn.com/wnba/player/_/id/766/sylvia-fowles","instagram":"sylvia_fowles","initials":"SF","slug":"sylvia-fowles","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/0/00/Sylvia_Fowles_2022_%2852283271158%29_%28cropped%29.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She won the WNBA MVP Award in 2017 and the WNBA Defensive Player of the Year award four times (2011, 2013, 2016, 2021). She led the Lynx to win the WNBA Championship in 2015 and 2017, and she was named the MVP of the WNBA Finals both times.","storyRight":"In 2020, Fowles overtook Rebekkah Brunson to become the WNBA's career leader in rebounds. In 2025, Fowles was inducted into the Women's Basketball Hall of Fame and the Naismith Hall of Fame.","_sport":""},{"fullName":"Maya Moore","sport":"Basketball","legend":"Yes","story":"Maya April Moore (born June 11, 1989) is an American social justice advocate and former professional basketball player. Naming her their inaugural Performer of the Year in 2017, Sports Illustrated called Moore the \"greatest winner in the history of women's basketball\".","timeline":"Maya April Moore (born June 11, 1989) is an American social justice advocate and former professional basketball player.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Maya_Moore","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/9/93/Maya_Moore_speaking_at_the_Marshall_Project_in_Washington_DC_%2848751715837%29_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Maya+Moore","position":"Power forward","era":"Legacy","teams":"Minnesota Lynx","college":"UConn (2007–2011)","hometown":"[ 1 ] Jefferson City, Missouri, U.S.","nationality":"American","yearsActive":"2011–2018","jerseyNumber":"23","espnUrl":"https://www.espn.com/wnba/player/_/id/956/maya-moore","instagram":"mooremaya","initials":"Mm","slug":"maya-moore","proTitle":"Basketball Player & Social Justice Advocate","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/9/93/Maya_Moore_speaking_at_the_Marshall_Project_in_Washington_DC_%2848751715837%29_%28cropped%29.jpg","heroImageAlt":"Maya Moore speaking at the Marshall Project — WNBA champion who paused her career to fight for criminal justice reform","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Moore was selected for the Women's Basketball Hall of Fame in 2024. In 2025, Moore was selected to be inducted into the Naismith Memorial Basketball Hall of Fame.","storyRight":"In high school, Moore was the National Gatorade Player of the Year, the Gatorade Female Athlete of the Year, and a McDonald's All-American. She played forward for the UConn women's basketball team and won back to back national championships in 2009 and 2010.","_sport":""},{"fullName":"Arike Ogunbowale","sport":"Basketball","legend":"No","story":"Arike Faulina Ogunbowale (born March 2, 1997) is a Nigerian-American professional basketball player for the Dallas Wings of the Women's National Basketball Association (WNBA) and for the Mist of Unrivaled. She played college basketball for the Notre Dame Fighting Irish, before being drafted by the Wings with the fifth overall pick of the 2019 WNBA draft.","timeline":"Arike Faulina Ogunbowale (born March 2, 1997) is a Nigerian-American professional basketball player for the Dallas Wings of the Women's National Basketball Association (WNBA) and for the Mist of Unrivaled.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Arike_Ogunbowale","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/9/9c/Arike_Ogunbowale_01_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Arike+Ogunbowale","position":"Point guard / Shooting guard","era":"Current","teams":"Dallas Wings","college":"Notre Dame (2015–2019)","hometown":"Milwaukee, Wisconsin, U.S.","nationality":"American","yearsActive":"2019–present","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/3904577/arike-ogunbowale","instagram":"arike_ogunbowale","initials":"AO","slug":"arike-ogunbowale","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/9/9c/Arike_Ogunbowale_01_%28cropped%29.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She was the Most Outstanding Player of Notre Dame's 2018 national title run, hitting game-winning baskets in both the semi-final and championship game. Arike Ogunbowale was named WNBA All Star MVP in 2021 and 2024.","storyRight":"","_sport":""},{"fullName":"Jewell Loyd","sport":"Basketball","legend":"No","story ":"https://en.wikipedia.org/wiki/Jonquel_Jones","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/3/3d/Jonquel_Jones_WNBA_Finals_2024_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Jonquel+Jones","position":"Power forward / center","era":"Current","teams":"Connecticut Sun","college":"Clemson (2012–2013) George Washington (2013–2016)","hometown":"Freeport, The Bahamas","nationality":"","yearsActive":"2016–present","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/2999101/jonquel-jones","instagram":"jus242","initials":"JJ","slug":"jonquel-jones","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/3/3d/Jonquel_Jones_WNBA_Finals_2024_%28cropped%29.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Since May 2019, she also holds the citizenship of Bosnia and Herzegovina, allowing her to play for the national team. A 6'6\" power forward/center, Jones played college basketball for Clemson and George Washington.","storyRight":"After the February 2022 Russian invasion of Ukraine, she left the Russian team UMMC Ekaterinburg, and joined the Turkish team Çukurova Basketbol.","_sport":""},{"fullName":"Nneka Ogwumike","sport":"Basketball","legend":"No","story":"Nnemkadi Chinwe Victoria \"Nneka\" Ogwumike (; born July 2, 1990) is an American professional basketball player for the Los Angeles Sparks of the Women's National Basketball Association (WNBA). She was drafted by the Sparks first overall in the 2012 WNBA draft and signed an endorsement deal with Nike soon after.","timeline":"Nnemkadi Chinwe Victoria \"Nneka\" Ogwumike (; born July 2, 1990) is an American professional basketball player for the Los Angeles Sparks of the Women's National Basketball Association (WNBA).","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Nneka_Ogwumike","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/9/9d/Nneka_Ogwumike_2024_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Nneka+Ogwumike","position":"Power forward","era":"Current","teams":"Los Angeles Sparks","college":"Stanford (2008–2012)","hometown":"Tomball, Texas, U.S.","nationality":"American","yearsActive":"2012–present","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/1068/nneka-ogwumike","instagram":"nnemkadi","initials":"NO","slug":"nneka-ogwumike","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/9/9d/Nneka_Ogwumike_2024_%28cropped%29.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Ogwumike spent her first 12 seasons with the Sparks and was named WNBA MVP for the 2016 WNBA season and won the WNBA Finals the same year. She was named to The W25, the league's list of the top 25 players of its first 25 years, in 2021.","storyRight":"Her name \"Nneka\" means \"Mother is Supreme\" in the Igbo language of Nigeria, where her family hails from. She is the older sister of Chiney Ogwumike, the first overall pick in the 2014 WNBA draft, who most recently played for the Sparks.","_sport":""},{"fullName":"Alyssa Thomas","sport":"Basketball","legend":"No","story":"Alyssa Thomas (born April 12, 1992) is an American professional basketball forward for the Phoenix Mercury of the Women's National Basketball Association (WNBA) and for the Laces of Unrivaled. She played college basketball for the Maryland Terrapins.","timeline":"Alyssa Thomas (born April 12, 1992) is an American professional basketball forward for the Phoenix Mercury of the Women's National Basketball Association (WNBA) and for the Laces of Unrivaled.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Alyssa_Thomas","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/d/d0/2_Alyssa_Thomas_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Alyssa+Thomas","position":"Power forward","era":"Current","teams":"Connecticut Sun","college":"Maryland (2010–2014)","hometown":"Harrisburg, Pennsylvania, U.S.","nationality":"American","yearsActive":"2014–present","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/2529140/alyssa-thomas","instagram":"athomas_25","initials":"AT","slug":"alyssa-thomas","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/d/d0/2_Alyssa_Thomas_%28cropped%29.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"The New York Liberty drafted Thomas 4th overall in the 2014 WNBA draft, and immediately traded her to the Connecticut Sun along with Kelsey Bone and a 2015 first-round draft pick in exchange for Tina Charles. Thomas is the University of Maryland's all-time leader in scoring, rebounding and double-doubles for the women's program, and one of nine athletes in NCAAW history with six career triple-doubles.","storyRight":"Thomas is the WNBA's career leader in triple-doubles. She is the only player to record 15+, 15+, 10+ with 0 turnovers in WNBA history.","_sport":""},{"fullName":"Aliyah Boston","sport":"Basketball","legend":"No","story":"Aliyah Boston (born December 11, 2001) is an American professional basketball power forward and center for the Indiana Fever of the Women's National Basketball Association (WNBA) and for the Phantom of Unrivaled. She was named 2023 WNBA Rookie of the Year in a unanimous vote and the AP Rookie of the Year.","timeline":"Aliyah Boston (born December 11, 2001) is an American professional basketball power forward and center for the Indiana Fever of the Women's National Basketball Association (WNBA) and for the Phantom of Unrivaled.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Aliyah_Boston","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/a/ae/Aliyah_Boston_%2853029603721%29_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Aliyah+Boston","position":"Power forward / center","era":"Rising","teams":"Indiana Fever","college":"South Carolina (2019–2023)","hometown":"Saint Thomas, U.S. Virgin Islands","nationality":"American","yearsActive":"2023–present","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/4432831/aliyah-boston","instagram":"aliyah.boston","initials":"AB","slug":"aliyah-boston","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/a/ae/Aliyah_Boston_%2853029603721%29_%28cropped%29.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She played college basketball at the University of South Carolina. Born in Saint Thomas, United States Virgin Islands, Boston attended Worcester Academy in Worcester, Massachusetts, where she was a McDonald's All-American and a three-time Massachusetts Gatorade Player of the Year.","storyRight":"Boston has won several gold medals representing the United States. Boston led South Carolina to their second national championship in school history in 2022 and was named the NCAA Tournament Most Outstanding Player (MOP).","_sport":""},{"fullName":"Breanna Stewart","sport":"Basketball","legend":"","story":"Breanna Mackenzie Stewart ( bree-ANN-ə; born August 27, 1994), nicknamed \"Stewie\", is an American professional basketball player for the New York Liberty of the Women's National Basketball Association (WNBA) and for the Mist of Unrivaled. She is one of the most accomplished basketball players in history.","timeline":"Breanna Mackenzie Stewart ( bree-ANN-ə; born August 27, 1994), nicknamed \"Stewie\", is an American professional basketball player for the New York Liberty of the Women's National Basketball Association (WNBA) and for the Mist of Unrivaled.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Breanna_Stewart","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/9/97/Breanna_Stewart_WNBA_Finals_2024_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Breanna+Stewart","position":"Power forward","era":"Current","teams":"Seattle Storm","college":"UConn (2012–2016)","hometown":"Syracuse, New York, U.S.","nationality":"American","yearsActive":"2016–present","jerseyNumber":"30","espnUrl":"https://www.espn.com/wnba/player/_/id/2998928/breanna-stewart","instagram":"breannastewart30","initials":"Bs","slug":"breanna-stewart","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/9/97/Breanna_Stewart_WNBA_Finals_2024_%28cropped%29.jpg","heroImageAlt":"Breanna Stewart of the New York Liberty — two-time WNBA MVP and co-founder of the Unrivaled basketball league","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Stewart is a founder of the Unrivaled basketball league together with Napheesa Collier. In high school, Stewart was the National Gatorade Player of the Year, the Gatorade Female Athlete of the Year, and a McDonald's All-American.","storyRight":"She led the University of Connecticut Huskies to four consecutive national championships, was named the Final Four's most outstanding player a record four times, and was a three-time consensus national player of the year. She was the first overall pick in the 2016 WNBA draft and was named the 2016 WNBA Rookie of the Year.","_sport":""},{"fullName":"Sabrina Ionescu","sport":"Basketball","legend":"","story":"Sabrina Elaine Ionescu ( yə-NESS-kew; born December 6, 1997) is an American professional basketball player for the New York Liberty of the Women's National Basketball Association (WNBA). She is widely considered one of the greatest three-point shooters in WNBA history and is credited with growing the popularity of women's basketball.","timeline":"Sabrina Elaine Ionescu ( yə-NESS-kew; born December 6, 1997) is an American professional basketball player for the New York Liberty of the Women's National Basketball Association (WNBA).","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Sabrina_Ionescu","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/2/2f/Sabrina_Ionescu_2024.jpg","gettyUrl":"https://www.gettyimages.com/photos/Sabrina+Ionescu","position":"Point guard","era":"Current","teams":"New York Liberty","college":"Oregon (2016–2020)","hometown":"Walnut Creek, California, U.S.","nationality":"American","yearsActive":"2020–present","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/4066533/sabrina-ionescu","instagram":"sabrina_i","initials":"Si","slug":"sabrina-ionescu","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/2/2f/Sabrina_Ionescu_2024.jpg","heroImageAlt":"Sabrina Ionescu of the New York Liberty — greatest three-point shooter in WNBA history","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Ionescu played college basketball for the Oregon Ducks, where she twice won the John R. Wooden Award and Wade Trophy, earning consensus national player of the year honors as a senior.","storyRight":"She led Oregon to its first Final Four appearance in her junior season. Ionescu set the Division I career triple-doubles record and is the Pac-12 Conference all-time leader in assists.","_sport":""},{"fullName":"Britney Griner","sport":"Basketball","legend":"","story":"Brittney Yvette Griner (; born October 18, 1990) is an American professional basketball player for the Connecticut Sun of the Women's National Basketball Association (WNBA) and for the Vinyl of Unrivaled. She is a three-time Olympic gold medalist with the U.S.","timeline":"Brittney Yvette Griner (; born October 18, 1990) is an American professional basketball player for the Connecticut Sun of the Women's National Basketball Association (WNBA) and for the Vinyl of Unrivaled.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Brittney_Griner","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/e/e3/Brittney_Griner_3_%28cropped2%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Britney+Griner","position":"Center","era":"Current","teams":"Phoenix Mercury","college":"Baylor (2009–2013)","hometown":"Houston, Texas, U.S.","nationality":"American","yearsActive":"2013–present","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/2490553/brittney-griner","instagram":"brittneyyevettegriner","initials":"BG","slug":"britney-griner","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/e/e3/Brittney_Griner_3_%28cropped2%29.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"women's national basketball team and a six-time WNBA All-Star. Griner was named one of the 100 most influential people in the world by Time magazine in 2023.","storyRight":"In 2009, Griner was named the nation's No. 1 high school women's basketball player by Rivals.com.","_sport":""},{"fullName":"Kelsey Plum","sport":"Basketball","legend":"","story":"Kelsey Christine Plum (born August 24, 1994) is an American professional basketball player for the Los Angeles Sparks of the Women's National Basketball Association (WNBA) and for the Phantom of Unrivaled. Nicknamed \"Plum Dawg\", she is a four-time WNBA All-Star and was named the WNBA All-Star Game Most Valuable Player (MVP) in 2022.","timeline":"Kelsey Christine Plum (born August 24, 1994) is an American professional basketball player for the Los Angeles Sparks of the Women's National Basketball Association (WNBA) and for the Phantom of Unrivaled.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Kelsey_Plum","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/3/37/Kelsey_Plum_2023_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Kelsey+Plum","position":"Point guard","era":"Current","teams":"San Ant seyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/981/courtney-vandersloot","instagram":"","initials":"Cv","slug":"courtney-vandersloot","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/2/2c/Courtney_Vandersloot_%2853099258855%29_%28cropped%29.jpg","heroImageAlt":"Courtney Vandersloot — two-time WNBA champion and one of the greatest point guards in league history","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She has also played for UMMC Ekaterinburg in the Russian Premier League, Mist BC in Unrivaled, and teams in several other professional leagues. She is regarded as one of the greatest WNBA point guards of all time.","storyRight":"Vandersloot played college basketball for the Gonzaga Bulldogs, holding numerous records and becoming the first player to have her number retired by the program. She was the only West Coast Conference women's player to be named Player of the Year and tournament MVP three times.","_sport":""},{"fullName":"Rhyne Howard","sport":"Basketball","legend":"","story":"Rhyne Howard (born April 29, 2000) is an American professional basketball player for the Atlanta Dream of the Women's National Basketball Association (WNBA) and for the Vinyl of Unrivaled. She played college basketball for the Kentucky Wildcats.","timeline":"Rhyne Howard (born April 29, 2000) is an American professional basketball player for the Atlanta Dream of the Women's National Basketball Association (WNBA) and for the Vinyl of Unrivaled.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Rhyne_Howard","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/e/e2/Rhyne_Howard.jpg","gettyUrl":"https://www.gettyimages.com/photos/Rhyne+Howard","position":"Shooting guard","era":"Rising","teams":"Atlanta Dream","college":"Kentucky (2018–2022)","hometown":"Chattanooga, Tennessee, U.S.","nationality":"American","yearsActive":"2022–present","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/4398674/rhyne-howard","instagram":"rhyne.howard","initials":"Rh","slug":"rhyne-howard","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/e/e2/Rhyne_Howard.jpg","heroImageAlt":"Rhyne Howard of the Atlanta Dream — 2022 WNBA first overall pick and Rookie of the Year","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She graduated from Bradley Central High School in Cleveland, Tennessee, in 2018. She was drafted first overall by the Dream in the 2022 WNBA draft.","storyRight":"In her senior year of high school at Bradley Central, she was named 2018 Tennessee Gatorade Player of the Year and Tennessee Miss Basketball. Howard participated on the USA team in 2018 and 2019, leading them to a gold medal and was awarded MVP honors in 2018.","_sport":""},{"fullName":"Napheesa Collier","sport":"Basketball","legend":"","story":"Napheesa Collier ( nə-FEE-sə KOL-yər; born September 23, 1996), nicknamed \"Phee\", is an American professional basketball player for the Minnesota Lynx of the Women's National Basketball Association (WNBA) and for the Lunar Owls of Unrivaled. Collier is also a founder of the Unrivaled basketball league along with Breanna Stewart.","timeline":"Napheesa Collier ( nə-FEE-sə KOL-yər; born September 23, 1996), nicknamed \"Phee\", is an American professional basketball player for the Minnesota Lynx of the Women's National Basketball Association (WNBA) and for the Lunar Owls of Unrivaled.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Napheesa_Collier","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/0/0e/Napheesa_Collier_WNBA_Finals_2024_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Napheesa+Collier","position":"Power forward","era":"Current","teams":"Minnesota Lynx","college":"UConn (2015–2019)","hometown":"Jefferson City, Missouri, U.S.","nationality":"American","yearsActive":"2019–present","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/3917450/napheesa-collier","instagram":"napheesa24","initials":"Nc","slug":"napheesa-collier","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/0/0e/Napheesa_Collier_WNBA_Finals_2024_%28cropped%29.jpg","heroImageAlt":"Napheesa Collier of the Minnesota Lynx — Unrivaled co-founder and two-time Olympic gold medalist","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"After playing college basketball for the University of Connecticut Huskies, Collier was drafted by the Lynx with the 6th overall pick in the 2019 WNBA draft. She has won two Olympic gold medals playing on the United States women's national basketball team in the Tokyo 2020 and the Paris 2024 games.","storyRight":"She is also a vice president on the Women's National Basketball Players Association executive committee.","_sport":""},{"fullName":"Satou Sabally","sport":"Basketball","legend":"","story":"Isatou \"Satou\" Sabally (born April 25, 1998) is a German-American professional basketball player for the New York Liberty of the Women's National Basketball Association (WNBA) and for the Phantom of Unrivaled. She started playing as an amateur in the German second division, and later in the 1.","timeline":"Isatou \"Satou\" Sabally (born April 25, 1998) is a German-American professional basketball player for the New York Liberty of the Women's National Basketball Association (WNBA) and for the Phantom of Unrivaled.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Satou_Sabally","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/2/25/Satou_Sabally_2025a_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Satou+Sabally","position":"Small forward","era":"Current","teams":"Dallas Wings","college":"Oregon (2017–2020)","hometown":"New York City, New York, U.S.","nationali ssissippi State.","_sport":""},{"fullName":"Angel Reese","sport":"Basketball","legend":"","story":"Angel Reese (born May 6, 2002) is an American professional basketball player for the Atlanta Dream of the Women's National Basketball Association (WNBA), and for Rose of the Unrivaled basketball league. Nicknamed \"Bayou Barbie\" and \"Chi Barbie\", she played college basketball for the Maryland Terrapins and LSU Tigers.","timeline":"Angel Reese (born May 6, 2002) is an American professional basketball player for the Atlanta Dream of the Women's National Basketball Association (WNBA), and for Rose of the Unrivaled basketball league.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Angel_Reese","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/0/05/Angel_Reese_September_2024_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Angel+Reese","position":"Power forward","era":"Rising","teams":"Chicago Sky","college":"Maryland (2020–2022) LSU (2022–2024)","hometown":"Randallstown, Maryland, U.S.","nationality":"American","yearsActive":"2024–present","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/4433402/angel-reese","instagram":"angelreese5","initials":"Ar","slug":"angel-reese","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/0/05/Angel_Reese_September_2024_%28cropped%29.jpg","heroImageAlt":"Angel Reese — Bayou Barbie, LSU national champion and one of the most talked-about rising stars in women's basketball","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Reese attended Saint Frances Academy in Baltimore, Maryland, where she was awarded McDonald's All-American honors in 2020 and was ranked the number two player in her class by ESPN. She joined the Maryland Terrapins as the highest-ranked recruit in program history, but her freshman season in 2020–21 was interrupted by a fractured right foot.","storyRight":"She was named a third-team All-American by the Associated Press as a sophomore. In her junior season, Reese transferred to LSU and was a unanimous first-team All-American selection.","_sport":""},{"fullName":"Lexie Brown","sport":"Basketball","legend":"","story":"Alexis Kiah \"Lexie\" Brown (born October 27, 1994) is an American professional basketball player for the Seattle Storm of the Women's National Basketball Association (WNBA) and Athletes Unlimited Pro Basketball. She previously played for the Chicago Sky, Minnesota Lynx, Connecticut Sun, and Los Angeles Sparks in the WNBA.","timeline":"Alexis Kiah \"Lexie\" Brown (born October 27, 1994) is an American professional basketball player for the Seattle Storm of the Women's National Basketball Association (WNBA) and Athletes Unlimited Pro Basketball.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Lexie_Brown","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/9/97/Lexi_Brown_2_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Lexie+Brown","position":"Point guard / shooting guard","era":"Current","teams":"Connecticut Sun","college":"Maryland (2013–2015) Duke (2016–2018)","hometown":"Boston, Massachusetts, U.S.","nationality":"American","yearsActive":"2018–present","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/3058892/lexie-brown","instagram":"lexiebrown","initials":"Lb","slug":"lexie-brown","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/9/97/Lexi_Brown_2_%28cropped%29.jpg","heroImageAlt":"Lexie Brown of the Seattle Storm — WNBA guard and daughter of NBA player Dee Brown","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Brown was the ninth overall pick by the Sun in the 2018 WNBA draft. She played college basketball for the Maryland Terrapins and the Duke Blue Devils.","storyRight":"","_sport":""},{"fullName":"Chennedy Carter","sport":"Basketball","le ","era":"Legacy","teams":"Minnesota Lynx","college":"LSU (2002–2006)","hometown":"Baton Rouge, Louisiana, U.S.","nationality":"American","yearsActive":"2006–2020","jerseyNumber":"","espnUrl":"https://www.espn.com/wnba/player/_/id/695/seimone-augustus","instagram":"moneymone33","initials":"Sa","slug":"seimone-augustus","proTitle":"Professional Basketball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/7/79/Seimone_Augustus_in_2019_%28cropped%29.jpg","heroImageAlt":"Seimone Augustus — four-time WNBA champion and eight-time All-Star with the Minnesota Lynx","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She was drafted first overall by the Minnesota Lynx in the 2006 WNBA draft and played for the Lynx for most of her Women's National Basketball Association (WNBA) career except for her final season in with the Los Angeles Sparks. An eight-time All-Star and the 2011 finals MVP, Augustus led the Lynx to four WNBA championships.","storyRight":"She also won three gold medals in the Olympics on the U.S. national team.","_sport":""},{"fullName":"Lindsay Whalen","sport":"Basketball","legend":"","story":"Lindsay Marie Whalen (born May 9, 1982) is an American professional basketball coach and former player who is an assistant coach for the Minnesota Lynx of the Women's National Basketball Association (WNBA). Whalen played college basketball at the University of Minnesota, and led the team to its only NCAA tournament Final Four appearance in 2004.","timeline":"Lindsay Marie Whalen (born May 9, 1982) is an American professional basketball coach and former player who is an assistant coach for the Minnesota Lynx of the Women's National Basketball Association (WNBA).","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Lindsay_Whalen","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/8/80/Lindsay_Whalen_speaking_at_the_post-game_celebration_of_her_retirement_from_the_Minnesota_Lynx_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Lindsay+Whalen","position":"Point guard","era":"Legacy","teams":"Minnesota Lynx","college":"Minnesota (2000–2004)","hometown":"Hutchinson, Minnesota, U.S.","nationality":"American","yearsActive":"2004–2018","jerseyNumber":"13","espnUrl":"https://www.espn.com/wnba/player/bio/_/id/545/lindsay-whalen","instagram":"","initials":"Lw","slug":"lindsay-whalen","proTitle":"Basketball Player & Coach","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/8/80/Lindsay_Whalen_speaking_at_the_post-game_celebration_of_her_retirement_from_the_Minnesota_Lynx_%28cropped%29.jpg","heroImageAlt":"Lindsay Whalen at her Lynx retirement — four-time WNBA champion and Minnesota basketball legend","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Selected fourth overall in the 2004 WNBA draft by the Connecticut Sun, Whalen played for 15 seasons in the WNBA with the Sun and the Lynx, and is considered one of the better point guards in WNBA history. Whalen won two World titles and two Olympic gold medals with the United States women's national basketball team, as well as four WNBA championships with the Minnesota Lynx.","storyRight":"She retired from playing professional basketball at the end of the 2018 season as the WNBA's career leader in games won (323). Whalen was voted into the WNBA Top 20@20 as one of the league's top 20 players of all time in 2016, and was voted into The W25 as one of the league's top 25 players of all time in 2021.","_sport":""},{"fullName":"Cappie Pondexter","sport":"Basketball","legend":"","story":"Cappie Marie Pondexter (born January 7, 1983) is an American former professional basketball player. She was born in Oceanside, California and raised in Chicago, Illinois.","timeline":"Cappie Marie Pondexter (born January 7, 1983) is an American former professional basketball player.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Cappie_Pondexte
