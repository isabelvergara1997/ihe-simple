Soccer Hall of Famer","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She played collegiately for the North Carolina Tar Heels. She has been an assistant coach for Duke since 1992, overseeing its defensive unit principally.","storyRight":"She was inducted into the National Soccer Hall of Fame in 2006.","_sport":""},{"fullName":"Joy Fawcett","sport":"Soccer","legend":"","story":"Joy Lynn Fawcett (née Biefeld; born February 8, 1968) is an American soccer coach and former professional player. She earned 241 caps with the United States women's national soccer team and retired in 2004 as the highest scoring defender in team history.","timeline":"Joy Lynn Fawcett (née Biefeld; born February 8, 1968) is an American soccer coach and former professional player.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Joy_Fawcett","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/c/c6/Joy142007.jpg","gettyUrl":"https://www.gettyimages.com/photos/Joy+Fawcett","position":"Defender","era":"Legacy","teams":"United States women's national soccer team","college":"","hometown":"Inglewood, California , U.S.","nationality":"American","yearsActive":"1968–2009","jerseyNumber":"","espnUrl":"https://www.espn.com/soccer/player/stats/_/id/39050/joy-fawcett","instagram":"","initials":"Jf","slug":"joy-fawcett","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/c/c6/Joy142007.jpg","heroImageAlt":"Joy Fawcett, USWNT defender and highest-scoring defender in team history","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Fawcett was a founding member of the WUSA and was elected for induction into the National Soccer Hall of Fame in 2009. She was in the movie Soccer Mom as herself.","storyRight":"","_sport":""},{"fullName":"Tiffeny Milbrett","sport":"Soccer","legend":"","story":"Tiffeny Carleen Milbrett (born October 23, 1972) is an American former professional soccer forward who was a longtime member of the United States women's national team. In May 2018, the National Soccer Hall of Fame announced Milbrett will be enshrined in the Hall.","timeline":"Tiffeny Carleen Milbrett (born October 23, 1972) is an American former professional soccer forward who was a longtime member of the United States women's national team.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Tiffeny_Milbrett","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/8/87/Tiffeny_Milbrett_cropped.jpg","gettyUrl":"https://www.gettyimages.com/photos/Tiffeny+Milbrett","position":"Forward","era":"Legacy","teams":"United States women's national soccer team","college":"","hometown":"Portland, Oregon , U.S.","nationality":"American","yearsActive":"1972–2018","jerseyNumber":"","espnUrl":"","instagram":"","initials":"Tm","slug":"tiffeny-milbrett","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/8/87/Tiffeny_Milbrett_cropped.jpg","heroImageAlt":"Tiffeny Milbrett, USWNT forward and National Soccer Hall of Famer","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"A native of Oregon, she starred at the University of Portland where she scored a then school record 103 goals during her career. She won an Olympic gold medal in 1996 in Atlanta and a silver medal at the 2000 Olympics in Sydney.","storyRight":"She also played in three World Cups, winning in 1999. She is in the top five all-time in the United States national soccer team in three offensive categories.","_sport":""},{"fullName":"Birgit Prinz","sport":"Soccer","legend":"","story":"Birgit Prinz (born 25 October 1977) is a German former footballer, two-time FIFA Women's World Cup champion and three-time FIFA World Player of the Year. In addition to the German national team, Prinz played for 1.","timeline":"Birgit Prinz (born 25 October 1977) is a German former footballer, two-time FIFA Women's World Cup champion and three-time FIFA World Player of the Year.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Birgit_Prinz","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/3/39/Birgit_Prinz_20180519_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Birgit+Prinz","position":"Striker","era":"Legacy","teams":"Germany women's national football team","college":"","hometown":"Frankfurt , West Germany","nationality":"German","yearsActive":"1977–2011","jerseyNumber":"9","espnUrl":"https://www.espn.com/soccer/player/stats/_/id/108944/birgit-prinz","instagram":"","initials":"Bp","slug":"birgit-prinz","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/3/39/Birgit_Prinz_20180519_%28cropped%29.jpg","heroImageAlt":"Birgit Prinz — three-time FIFA World Player of the Year and Germany's all-time leading scorer","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"FFC Frankfurt in the Frauen-Bundesliga as well as the Carolina Courage in the Women's United Soccer Association (WUSA), the first professional women's league in the United States. Prinz remains one of the game's most prolific strikers and is the second FIFA Women's World Cup all-time leading scorer with 14 goals (second only to Marta from Brazil).","storyRight":"In 2011, she announced the end of her active career. She currently works as a sport psychologist for the men's and women's teams of Bundesliga club TSG 1899 Hoffenheim.","_sport":""},{"fullName":"Hope Solo","sport":"Soccer","legend":"","story":"Hope Amelia Stevens (née Solo; born July 30, 1981) is an American former soccer goalkeeper. She was a goalkeeper for the United States women's national soccer team from 2000 to 2016, and is a World Cup champion and two-time Olympic gold medalist.","timeline":"Hope Amelia Stevens (née Solo; born July 30, 1981) is an American former soccer goalkeeper.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Hope_Solo","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/8/85/Hope_Solo_USA_Training_%28edited%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Hope+Solo","position":"Goalkeeper","era":"Legacy","teams":"Seattle Reign FC, United States women's national soccer team","college":"","hometown":"Richland, Washington , U.S.","nationality":"American","yearsActive":"1981–2016","jerseyNumber":"","espnUrl":"https://www.espn.com/soccer/player/stats/_/id/158779/hope-solo","instagram":"hopesolo","initials":"Hs","slug":"hope-solo","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/8/85/Hope_Solo_USA_Training_%28edited%29.jpg","heroImageAlt":"Hope Solo in USWNT kit — two-time Olympic gold medalist and 2015 World Cup champion goalkeeper","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"After playing at the collegiate level for the University of Washington, she played professionally for the Philadelphia Charge in the Women's United Soccer Association (WUSA). When the WUSA folded after her first season, she traveled to Europe to play for the top division leagues in Sweden and France.","storyRight":"From 2009 to 2011, she played in the Women's Professional Soccer (WPS) for Saint Louis Athletica, Atlanta Beat and magicJack. After the WPS ceased operations in early 2012, she played for the Seattle Sounders in the W-League.","_sport":""},{"fullName":"Alex Morgan","sport":"Soccer","legend":"","story":"Alexandra Morgan Carrasco (born Alexandra Patricia Morgan; July 2, 1989) is an American former professional soccer player. She co-captained the United States national team with Carli Lloyd and Megan Rapinoe from 2018 to 2020 and with Lindsey Horan in 2023.","timeline":"Alexandra Morgan Carrasco (born Alexandra Patricia Morgan; July 2, 1989) is an American former professional soccer player.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Alex_Morgan","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/1/10/Alex_Morgan_May19.jpg","gettyUrl":"https://www.gettyimages.com/photos/Alex+Morgan","position":"Striker","era":"Legacy","teams":"United States women's national soccer team, Portland Thorns FC, Western New York Flash, Orlando Pride","college":"","hometown":"San Dimas, California , U.S.","nationality":"American","yearsActive":"1989–2024","jerseyNumber":"13","espnUrl":"https://www.espn.com/soccer/player/_/id/158774/alex-morgan","instagram":"alexmorgan13","initials":"Am","slug":"alex-morgan","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/1/10/Alex_Morgan_May19.jpg","heroImageAlt":"Alex Morgan in USWNT jersey — two-time World Cup champion and one of the most recognizable athletes in women's sports","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Shortly after graduating early from the University of California, Berkeley, where she played for the California Golden Bears, Morgan was drafted number one overall in the 2011 WPS Draft by the Western New York Flash. There, she made her professional debut and helped the team win the league championship.","storyRight":"Morgan, who was 22 at the time, was the youngest player on the national team at the 2011 FIFA Women's World Cup, where the team was runner-up. At the 2012 London Olympics, she scored the match-winning goal in the 123rd minute of the semi-final match against Canada.","_sport":""},{"fullName":"Wendie Renard","sport":"Soccer","legend":"","story":"Wendeleine Thérèse Renard (born 20 July 1990) is a French professional footballer who plays as a centre-back for Première Ligue club Lyon and the France national team. Renard is one of the most decorated players in modern women's club football.","timeline":"Wendeleine Thérèse Renard (born 20 July 1990) is a French professional footballer who plays as a centre-back for Première Ligue club Lyon and the France national team.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Wendie_Renard","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/6/64/2019-05-17_Fu%C3%9Fball%2C_Frauen%2C_UEFA_Women%27s_Champions_League%2C_Olympique_Lyonnais_-_FC_Barcelona_StP_0635_LR10_by_Stepro.jpg","gettyUrl":"https://www.gettyimages.com/photos/Wendie+Renard","position":"Centre-back","era":"Legacy","teams":"France women's national football team","college":"","hometown":"Schœlcher , Martinique, France","nationality":"French","yearsActive":"1990–2019","jerseyNumber":"3","espnUrl":"https://www.espn.com/soccer/player/_/id/158816/wendie-renard","instagram":"wendie_renard","initials":"Wr","slug":"wendie-renard","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/6/64/2019-05-17_Fu%C3%9Fball%2C_Frauen%2C_UEFA_Women%27s_Champions_League%2C_Olympique_Lyonnais_-_FC_Barcelona_StP_0635_LR10_by_Stepro.jpg","heroImageAlt":"Wendie Renard of Lyon in the Champions League — most decorated club player in women's football history","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She has won a record 18 French league titles and eight European Cups. In 2019, the New York Times described her as an \"institution\" at Lyon, the most successful club in European women's football.","storyRight":"","_sport":""},{"fullName":"Sophia Smith","sport":"Soccer","legend":"","story":"Sophia Olivia Wilson (née Smith; born August 10, 2000) is an American professional soccer player who plays as a forward for Portland Thorns FC of the National Women's Soccer League (NWSL) and the United States national team. Wilson played college soccer for the Stanford Cardinal, which she helped lead to the 2019 national championship.","timeline":"Sophia Olivia Wilson (née Smith; born August 10, 2000) is an American professional soccer player who plays as a forward for Portland Thorns FC of the National Women's Soccer League (NWSL) and the United States national team.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Sophia_Wilson","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/b/b0/Sophia_Smith_2024-02_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Sophia+Smith","position":"Forward","era":"Rising","teams":"United States women's national soccer team, Portland Thorns FC","college":"","hometown":"Windsor, Colorado , U.S.","nationality":"American","yearsActive":"2000–2024","jerseyNumber":"9","espnUrl":"https://www.espn.com/soccer/player/_/id/43770/sophia-wilson","instagram":"sophsssmith","initials":"SS","slug":"sophia-smith","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/b/b0/Sophia_Smith_2024-02_%28cropped%29.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She was picked first overall by the Thorns in the 2020 NWSL College Draft. In 2021, she led the Thorns in scoring on their way to winning the NWSL Shield.","storyRight":"In 2022, she led the Thorns to the NWSL Championship and was named the NWSL Most Valuable Player and Championship MVP. She received the NWSL Golden Boot as the league's top scorer in 2023.","_sport":""},{"fullName":"Rose Lavelle","sport":"Soccer","legend":"","story":"Rosemary Kathleen Lavelle ( lə-VEL; born May 14, 1995) is an American professional soccer player who plays as a midfielder for Gotham FC of the National Women's Soccer League (NWSL) and the United States national team. Lavelle played college soccer for the Wisconsin Badgers, earning first-team All-American honors in 2015, and was drafted first overall by the Boston Breakers in the 2017 NWSL College Draft.","timeline":"Rosemary Kathleen Lavelle ( lə-VEL; born May 14, 1995) is an American professional soccer player who plays as a midfielder for Gotham FC of the National Women's Soccer League (NWSL) and the United States national team.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Rose_Lavelle","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/3/31/Rose_Lavelle_USWNT_vs_Italy_Nov_28_2025-186_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Rose+Lavelle","position":"Midfielder","era":"Current","teams":"United States women's national soccer team","college":"","hometown":"Cincinnati , Ohio, United States","nationality":"American","yearsActive":"1995–2025","jerseyNumber":"16","espnUrl":"https://www.espn.com/soccer/player/_/id/209984/rose-lavelle","instagram":"lavellerose","initials":"Rl","slug":"rose-lavelle","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/3/31/Rose_Lavelle_USWNT_vs_Italy_Nov_28_2025-186_%28cropped%29.jpg","heroImageAlt":"Rose Lavelle in USWNT uniform — 2019 World Cup Golden Ball winner and NWSL championship MVP","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"After the Breakers folded, she was drafted to the Washington Spirit and played three seasons there. She then played for Manchester City and OL Reign before signing as a free agent with Gotham.","storyRight":"She won her first NWSL Championship with Gotham in 2025 and was named the championship MVP. She has been named in the NWSL Best XI three times.","_sport":""},{"fullName":"Lindsey Horan","sport":"Soccer","legend":"","story":"Lindsey Michelle Heaps (née Horan; hə-RAN; born May 26, 1994) is an American professional soccer player who plays as a midfielder for Première Ligue club OL Lyonnes and captains the United States national team. She will join Denver Summit FC of the National Women's Soccer League (NWSL) in June 2026.","timeline":"Lindsey Michelle Heaps (née Horan; hə-RAN; born May 26, 1994) is an American professional soccer player who plays as a midfielder for Première Ligue club OL Lyonnes and captains the United States national team.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Lindsey_Heaps","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/a/a9/Lindsey_Heaps_USWNT_vs_Italy_Nov_28_2025-047_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Lindsey+Horan","position":"Forward attacking midfielder central midfielder","era":"Current","teams":"Portland Thorns FC, United States women's national soccer team","college":"","hometown":"Golden, Colorado , U.S.","nationality":"American","yearsActive":"1994–2026","jerseyNumber":"10","espnUrl":"https://www.espn.com/soccer/player/_/id/228716/lindsey-heaps","instagram":"lindseyhoran10","initials":"LH","slug":"lindsey-horan","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/a/a9/Lindsey_Heaps_USWNT_vs_Italy_Nov_28_2025-047_%28cropped%29.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Heaps began her career with France's Paris Saint-Germain at age 18 in 2012, emerging as a prolific scorer. In 2016, she joined the NWSL's Portland Thorns, winning NWSL Most Valuable Player in 2018.","storyRight":"She was a leading player for the Thorns during their 2017 championship season, scoring the winning goal in the championship game. After six years in Portland, she joined French powerhouse Lyon, winning the UEFA Women's Champions League in 2022.","_sport":""},{"fullName":"Crystal Dunn","sport":"Soccer","legend":"","story":"Crystal Alyssia Soubrier (née Dunn; born July 3, 1992) is an American former professional soccer player. A versatile player, she played primarily as an attacking midfielder or forward for club and left back for country.","timeline":"Crystal Alyssia Soubrier (née Dunn; born July 3, 1992) is an American former professional soccer player.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Crystal_Dunn","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/1/12/Crystal_Dunn_2024-01_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Crystal+Dunn","position":"Forward attacking midfielder left back","era":"Legacy","teams":"Portland Thorns FC","college":"","hometown":"New Hyde Park , New York , U.S.","nationality":"American","yearsActive":"1992–2026","jerseyNumber":"","espnUrl":"https://www.espn.com/soccer/player/_/id/227388/crystal-dunn","instagram":"cdunn19","initials":"Cd","slug":"crystal-dunn","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/1/12/Crystal_Dunn_2024-01_%28cropped%29.jpg","heroImageAlt":"Crystal Dunn — Portland Thorns forward and the most versatile player in USWNT history","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Dunn played college soccer for the North Carolina Tar Heels, winning the national championship and the Hermann Trophy in 2012. She was drafted first overall by the Washington Spirit in the 2014 NWSL College Draft.","storyRight":"The following year, she won the NWSL Most Valuable Player and the Golden Boot awards, becoming the youngest player to win both awards at age 23. After one year with English club Chelsea, Dunn joined the North Carolina Courage in 2018, winning two consecutive NWSL Shields and NWSL Championships.","_sport":""},{"fullName":"Becky Sauerbrunn","sport":"Soccer","legend":"","story":"Rebecca Elizabeth Sauerbrunn (born June 6, 1985) is an American former professional soccer player who played as a center back. She co-captained the United States national team with Carli Lloyd from 2016 to 2018 and was the captain of the team from 2021 to 2023.","timeline":"Rebecca Elizabeth Sauerbrunn (born June 6, 1985) is an American former professional soccer player who played as a center back.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Becky_Sauerbrunn","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/b/b7/Becky_Sauerbrunn_%2849628077113%29_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Becky+Sauerbrunn","position":"Center back","era":"Legacy","teams":"United States women's national soccer team, Portland Thorns FC","college":"","hometown":"St. Louis , Missouri, U.S.","nationality":"American","yearsActive":"1985–2024","jerseyNumber":"","espnUrl":"https://www.espn.com/soccer/player/_/id/158780/becky-sauerbrunn","instagram":"reeba04","initials":"Bs","slug":"becky-sauerbrunn","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/b/b7/Becky_Sauerbrunn_%2849628077113%29_%28cropped%29.jpg","heroImageAlt":"Becky Sauerbrunn, former USWNT captain and four-time NWSL Defender of the Year","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Sauerbrunn played college soccer for the Virginia Cavaliers before starting her professional career with the Washington Freedom in Women's Professional Soccer in 2010. After the National Women's Soccer League (NWSL) formed in 2013, Sauerbrunn led FC Kansas City to two of the league's first three championships.","storyRight":"She was named NWSL Defender of the Year three times with Kansas City and once with Utah Royals FC. She won her third championship with Portland Thorns FC, with which she retired in 2024.","_sport":""},{"fullName":"Sarah Nurse","sport":"Hockey","legend":"","story":"Sarah Nurse (born January 4, 1995) is a Canadian professional ice hockey player and alternate captain for the Vancouver Goldeneyes of the Professional Women's Hockey League (PWHL) and Canada women's national ice hockey team. Nurse won Olympic gold at the 2022 Winter Olympics—where she broke the single-tournament Olympic point record with 18 and became the first Black woman to win a gold medal in Olympic ice-hockey—and silver at the 2018 Winter Olympics.","timeline":"Sarah Nurse (born January 4, 1995) is a Canadian professional ice hockey player and alternate captain for the Vancouver Goldeneyes of the Professional Women's Hockey League (PWHL) and Canada women's national ice hockey team.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Sarah_Nurse","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/a/ab/Sarah_Nurse.jpg","gettyUrl":"https://www.gettyimages.com/photos/Sarah+Nurse","position":"Forward","era":"Current","teams":"Toronto Sceptres, Canada women's national ice hockey team, Vancouver Goldeneyes","college":"","hometown":"Burlington, Ontario, Canada","nationality":"Canadian","yearsActive":"2015–present","jerseyNumber":"","espnUrl":"","instagram":"nursey16","initials":"Sn","slug":"sarah-nurse","proTitle":"Professional Ice Hockey Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/a/ab/Sarah_Nurse.jpg","heroImageAlt":"Sarah Nurse of the Vancouver Goldeneyes — first Black woman to win Olympic gold in ice hockey","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She has competed in six IIHF World Women's Championships, securing three golds (2021, 2022, 2024), two silvers (2023, 2025), and one bronze (2019). After a standout college career with the Wisconsin Badgers, featuring four Frozen Four appearances, she played one season with the Toronto Furies of the Canadian Women's Hockey League (CWHL).","storyRight":"Nurse co-founded the Professional Women's Hockey Players Association (PWHPA), serving on its board, and later joined the PWHL's executive committee for the PWHL Players Association (PWHLPA) upon the PWHL's 2023 launch.","_sport":""},{"fullName":"Natalie Spooner","sport":"Hockey","legend":"","story":"Natalie Marie Spooner (born October 17, 1990) is a Canadian professional ice hockey player for the Toronto Sceptres of the Professional Women's Hockey League (PWHL) and a member of the Canadian national women's team. She was named the IIHF Female Player of the Year in 2024.","timeline":"Natalie Marie Spooner (born October 17, 1990) is a Canadian professional ice hockey player for the Toronto Sceptres of the Professional Women's Hockey League (PWHL) and a member of the Canadian national women's team.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Natalie_Spooner","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/8/84/Natalie_Spooner_%2848778653541%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Natalie+Spooner","position":"Forward","era":"Current","teams":"Canada women's national ice hockey team, Toronto Sceptres","college":"","hometown":"Scarborough, Ontario, Canada","nationality":"Canadian","yearsActive":"2007–present","jerseyNumber":"","espnUrl":"","instagram":"natspooner5","initials":"Ns","slug":"natalie-spooner","proTitle":"Professional Ice Hockey Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/8/84/Natalie_Spooner_%2848778653541%29.jpg","heroImageAlt":"Natalie Spooner of Toronto Sceptres — IIHF Female Player of the Year 2024 and four-time Olympic medalist","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"With the Canadian national team, Spooner is a four-time Olympic medalist, winning gold at the 2014 and 2022 Olympics, and silver at the 2018 and 2026 Olympics. She has won 11 medals at the IIHF Women's World Championship (three gold, seven silver, one bronze) since making her debut in 2011.","storyRight":"In 2014, she became the first player to win both an Olympic gold medal and the Clarkson Cup in the same year. In the PWHL's inaugural season, Spooner led the league in both goals and points, and was awarded the Billie Jean King MVP Award, PWHL Forward of the Year, and named to the PWHL First Team All-Star.","_sport":""},{"fullName":"Brianne Jenner","sport":"Hockey","legend":"","story":"Brianne Alexandra Jenner (born May 4, 1991) is a Canadian professional ice hockey player and captain for the Ottawa Charge of the Professional Women's Hockey League (PWHL) and a member of Canada women's national ice hockey team. Jenner is a three-time Olympic medallist, having won gold medals at Sochi 2014 and Beijing 2022, and a silver medal at PyeongChang 2018.","timeline":"Brianne Alexandra Jenner (born May 4, 1991) is a Canadian professional ice hockey player and captain for the Ottawa Charge of the Professional Women's Hockey League (PWHL) and a member of Canada women's national ice hockey team.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Brianne_Jenner","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/f/f2/Wilgren_jenner_3rd_12_17_%2854992945624%29_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Brianne+Jenner","position":"Forward","era":"Current","teams":"Ottawa Charge, Canada women's national ice hockey team","college":"","hometown":"Oakville, Ontario, Canada","nationality":"Canadian","yearsActive":"2008–present","jerseyNumber":"","espnUrl":"","instagram":"bjenner19","initials":"Bj","slug":"brianne-jenner","proTitle":"Professional Ice Hockey Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/f/f2/Wilgren_jenner_3rd_12_17_%2854992945624%29_%28cropped%29.jpg","heroImageAlt":"Brianne Jenner of Ottawa Charge — three-time Olympic medalist and 2022 tournament MVP with 9 goals","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"At the Beijing 2022 Winter Olympics, she was named tournament MVP after tying the Olympic record with nine goals in a single tournament, adding five assists for 14 points. She has won 11 medals at the IIHF Women's World Championship since her debut in 2012, including four gold medals (2012, 2021, 2022, 2024), six silver medals (2013, 2015, 2016, 2017, 2023, 2025), and one bronze medal (2019).","storyRight":"Jenner scored both goals in Canada's 2-1 gold medal victory over the United States at the 2022 IIHF Women's World Championship. Before joining the PWHL, Jenner was a founding board member of the Professional Women's Hockey Players Association (PWHPA) and helped launch the organization following the collapse of the Canadian Women's Hockey League in 2019.","_sport":""},{"fullName":"Blayre Turnbull","sport":"Hockey","legend":"","story":"Blayre Turnbull (born July 15, 1993) is a Canadian professional ice hockey forward and captain for the Toronto Sceptres of the Professional","timeline":"Blayre Turnbull (born July 15, 1993) is a Canadian professional ice hockey forward and captain for the Toronto Sceptres of the Professional Women's Hockey League (PWHL).","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Blayre_Turnbull","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/c/c5/Blayre_Turnbull_Feb_27_2024.jpg","gettyUrl":"https://www.gettyimages.com/photos/Blayre+Turnbull","position":"Forward","era":"Current","teams":"Toronto Sceptres, Canada women's national ice hockey team","college":"","hometown":"New Glasgow, Nova Scotia, Canada","nationality":"Canadian","yearsActive":"2011–present","jerseyNumber":"","espnUrl":"","instagram":"blayre.turnbull","initials":"Bt","slug":"blayre-turnbull","proTitle":"Professional Ice Hockey Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/c/c5/Blayre_Turnbull_Feb_27_2024.jpg","heroImageAlt":"Blayre Turnbull of Toronto Sceptres — PWHL captain and Team Canada forward","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Women's Hockey League (PWHL). She made her debut with the Canada women's national ice hockey team at the 2014 4 Nations Cup.","storyRight":"On September 6, 2023, Turnbull signed a three-year deal with the PWHL Toronto of the newly formed new Professional Women's Hockey League.","_sport":""},{"fullName":"Taylor Heise","sport":"Hockey","legend":"","story":"Taylor Heise ( HY-zee; born March 17, 2000) is an American professional ice hockey forward for the Minnesota Frost of the Professional Women's Hockey League (PWHL). A member of the United States women's national ice hockey team, she has won five IIHF medals—three consecutive U18 World Championship gold medals (2016–2018) and two Women's World Championship gold medals (2023, 2025).","timeline":"Taylor Heise ( HY-zee; born March 17, 2000) is an American professional ice hockey forward for the Minnesota Frost of the Professional Women's Hockey League (PWHL).","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Taylor_Heise","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/3/3f/Taylor_Heise_2024.jpg","gettyUrl":"https://www.gettyimages.com/photos/Taylor+Heise","position":"Forward","era":"Rising","teams":"Minnesota Frost","college":"","hometown":"Lake City, Minnesota, U.S.","nationality":"American","yearsActive":"2017–present","jerseyNumber":"","espnUrl":"","instagram":"taylorheise9","initials":"Th","slug":"taylor-heise","proTitle":"Professional Ice Hockey Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/3/3f/Taylor_Heise_2024.jpg","heroImageAlt":"Taylor Heise of Minnesota Frost — Patty Kazmaier Award winner and rising star in women's hockey","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She was named Tournament MVP at both the 2018 U18 World Championship and the 2022 IIHF Women's World Championship, where she led the tournament with 18 points, the most by any player in nearly 30 years. Heise played college ice hockey at the University of Minnesota, where she won the Patty Kazmaier Award in 2022 as the nation's top player.","storyRight":"During her five-year collegiate career (2018–2023), she recorded 227 points on 97 goals and 130 assists in 175 games, setting a program record for most games played. She was a two-time CCM/AHCA First-Team All-American and two-time WCHA Forward of the Year (2022, 2023), leading the NCAA Division I in scoring as a senior with 66 points and in goals as a graduate student with 29.","_sport":""},{"fullName":"Alina Müller","sport":"Hockey","legend":"","story":"Alina Müller (born 12 March 1998) is a Swiss ice hockey forward for the Boston Fleet of the Professional Women's Hockey League (PWHL) and a member of the Switzerland women's national ice hockey team. She played college ice hockey at Northeastern.","timeline":"Alina Müller (born 12 March 1998) is a Swiss ice hockey forward for the Boston Fleet of the Professional Women's Hockey League (PWHL) and a member of the Switzerland women's national ice hockey team.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Alina_M%C3%BCller","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/9/99/Alina_M%C3%BCller_Boston_Fleet_2025.jpg","gettyUrl":"https://www.gettyimages.com/photos/Alina+M%C3%BCller","position":"Forward","era":"Current","teams":"Boston Fleet","college":"","hometown":"Lengnau, Switzerland","nationality":"Swiss","yearsActive":"2013–present","jerseyNumber":"","espnUrl":"","instagram":"","initials":"Am","slug":"alina-m-ller","proTitle":"Professional Ice Hockey Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/9/99/Alina_M%C3%BCller_Boston_Fleet_2025.jpg","heroImageAlt":"Alina Müller of Boston Fleet — youngest Olympic medal winner in ice hockey history at age 15","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"At the age of 15, she became the youngest ice hockey player ever to win an Olympic medal, scoring the game-winning goal for Switzerland in the bronze medal game at the 2014 Winter Olympics. She scored the game-winning goal for Switzerland in the bronze game at the 2026 Winter Olympics as well.","storyRight":"","_sport":""},{"fullName":"Sarah Fillier","sport":"Hockey","legend":"","story":"Sarah Anne Fillier (born June 9, 2000) is a Canadian ice hockey player who is a forward for the Canada women's national ice hockey team and the New York Sirens of the Professional Women's Hockey League (PWHL). Internationally, Fillier has won Olympic gold at the 2022 Winter Olympics, where she finished sec // Normalize sport
DB_RAW.forEach(a => {
  const s = (a.sport||'').toLowerCase();
  if(s.includes('basketball')) a._sport='Basketball';
  else if(s.includes('soccer')||s.includes('football')) a._sport='Soccer';
  else if(s.includes('hockey')) a._sport='Hockey';
  else if(s.includes('tennis')) a._sport='Tennis';
  else if(s.includes('track')||s.includes('field')) a._sport='Track & Field';
  else a._sport='Other Sports';
});

// ── State ─────────────────────────────────────────────────────────────────
let current = null;           // active editable athlete object
let savedAthletes = {};       // name → saved data (localStorage)
let activeFilter = '';

// Load saved from localStorage
try {
  const ls = localStorage.getItem('ihe_athletes');
  if(ls) savedAthletes = JSON.parse(ls);
} catch(e){}

function persistSave() {
  try { localStorage.setItem('ihe_athletes', JSON.stringify(savedAthletes)); } catch(e){}
}

// ── Sidebar list ──────────────────────────────────────────────────────────
function renderList(filter='', query='') {
  let items = filter ? DB_RAW.filter(a=>a._sport===filter) : [...DB_RAW];
  if(query) items = items.filter(a=>a.fullName.toLowerCase().includes(query.toLowerCase()));
  items.sort((a,b)=>a.fullName.localeCompare(b.fullName));
  document.getElementById('list-count').textContent = items.length + ' ATHLETES';
  document.getElementById('athlete-list').innerHTML = items.map(a=>`
    <div class="athlete-item${a.fullName===current?.fullName?' active':''}${savedAthletes[a.fullName]?' saved':''}" data-name="${esc(a.fullName)}">
      <div class="ai-name">${esc(a.fullName)}</div>
      <div class="ai-meta">${esc(a._sport)}${a.era?' · '+esc(a.era):''}</div>
      <div class="ai-saved-dot"></div>
    </div>`).join('');
  document.querySelectorAll('.athlete-item').forEach(el=>{
    el.addEventListener('click',()=>selectAthlete(el.dataset.name));
  });
}

renderList();

// ── Select & load athlete ─────────────────────────────────────────────────
function selectAthlete(name) {
  const base = DB_RAW.find(a=>a.fullName===name);
  if(!base) return;
  // Start from saved if exists, else from DB
  const src = savedAthletes[name] ? savedAthletes[name] : base;
  current = JSON.parse(JSON.stringify(src));
  // Ensure all editable fields exist
  const defaults = {
    initials:'', slug:slugify(name), heroImageUrl: current.wikiPhoto||'',
    heroImageAlt:name, heroImageCredit:'', heroImageCreditSource:'Wikipedia',
    agent:'', proTitle:'', storyLeft:'', storyRight:'', heroImageCreditOther:'',
    youtube:'', tiktok:'', facebook:'', twitter:'',
    _timeline:[], _awards:[], _media:[]
  };
  Object.keys(defaults).forEach(k=>{ if(current[k]===undefined||current[k]===null) current[k]=defaults[k]; });
  // Parse timeline/awards if not already parsed
  if(!Array.isArray(current._timeline)) current._timeline = parseTimeline(current.timeline||'');
  if(!Array.isArray(current._awards))   current._awards   = parseAwards(current.awards||'');
  if(!Array.isArray(current._media))    current._media    = current._media||[];

  renderForm();
  updateProgress();
  renderList(activeFilter, document.getElementById('sidebar-search').value);
  document.getElementById('save-btn').disabled = false;
  document.getElementById('current-name').style.color = 'var(--text)';
}

function slugify(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }

// ── Parse helpers ─────────────────────────────────────────────────────────
function parseTimeline(text) {
  if(!text) return [];
  const lines = text.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const items = [];
  lines.forEach(line=>{
    const m = line.match(/^(\d{4})\s+(.+)/);
    if(m) items.push({id:rnd(), year:m[1], title:m[2], desc1:'', desc2:'', imageUrl:'', imageAlt:'', imageCredit:'', imageCreditSource:''});
    else if(items.length && !line.match(/^\d{4}/)){
      if(!items[items.length-1].desc1) items[items.length-1].desc1=line;
    }
  });
  return items;
}

function parseAwards(text) {
  if(!text) return [];
  const items = [];
  let cat = 'Individual Awards';
  text.split(/\n/).forEach(line=>{
    line = line.trim();
    if(!line) return;
    if(['Individual Awards','Team & Competition','Legacy'].includes(line)){cat=line;return;}
    const m = line.match(/^(.+?)\s*\(([^)]+)\)$/);
    if(m) items.push({id:rnd(), years:m[2], category:cat, name:m[1].trim()});
    else if(line.length>2) items.push({id:rnd(), years:'', category:cat, name:line});
  });
  return items;
}

function rnd(){ return Math.random().toString(36).slice(2); }

        <div class="label req">Hero Image</div>
        <div class="img-group">
          <div class="img-group-label">Image URL</div>
          <input id="f-heroImageUrl" value="${esc(a.heroImageUrl)}" placeholder="https://...">
          <div class="ig-row" style="margin-top:6px">
            <div>
              <div class="img-group-label">Alt Text</div>
              <input id="f-heroImageAlt" value="${esc(a.heroImageAlt)}" placeholder="e.g. Cheryl Miller driving to the basket at the 1984 Olympics — specific descriptions improve SEO">
            </div>
            <div>
              <div class="img-group-label">Credit Source</div>
              <select id="f-heroImageCreditSource" onchange="toggleOtherCredit('f-heroImageCreditOther',this);const cw=document.getElementById('f-heroCredit-wrap');if(cw)cw.style.display=SELF_CREDIT.has(this.value)?'none':'block';">
                ${['Getty Images','AP Images','Reuters','Fox Sports','ESPN Images','Wikipedia / Wikimedia','Team / Club','Photographer','Other'].map(s=>`<option ${a.heroImageCreditSource===s?'selected':''}>${s}</option>`).join('')}
              </select>
              <div class="other-credit-wrap${!SELF_CREDIT.has(a.heroImageCreditSource)?' visible':''}" id="f-heroImageCreditOther-wrap">

              </div>
            </div>
          </div>
          <div style="margin-top:6px">
            <div id="f-heroCredit-wrap" style="display:${SELF_CREDIT.has(a.heroImageCreditSource)?'none':'block'}">

              <input id="f-heroImageCredit" value="${esc(a.heroImageCredit||'')}" placeholder="e.g. John Smith">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ESSENTIALS -->
    <div class="section">
      <div class="sec-hdr"><div class="sec-bar" style="background:var(--g)"></div><span class="sec-label" style="color:var(--g)">Essentials</span></div>
      <div class="grid4">
        <div class="field"><div class="label req">Sport</div>
          <select id="f-sport">${['Soccer','Basketball','Tennis','Swimming','Track & Field','Volleyball','Softball','Golf','Gymnastics','Ice Hockey','Rugby','Cycling','Boxing','MMA','Rowing','Skiing','Snowboarding','Surfing','Other'].map(s=>`<option ${(a.sport||a._sport)===s?'selected':''}>${s}</option>`).join('')}</select>
        </div>
        
        <div class="field"><div class="label">Position</div><input id="f-position" value="${esc(a.position)}" placeholder="e.g. Midfielder"></div>
        <div class="field"><div class="label">Era</div>

        <div class="field"><div class="label">Hometown</div><input id="f-hometown" value="${esc(a.hometown)}"></div>
        <div class="field"><div class="label">College</div><input id="f-college" value="${esc(a.college)}"></div>
      </div>
      <div class="grid3">
        <div class="field"><div class="label">Teams / Affiliations</div><input id="f-teams" value="${esc(a.teams)}"></div>
        <div class="field"><div class="label">Agent</div><input id="f-agent" value="${esc(a.agent||'')}"></div>
        <div class="field"><div class="label">Pro Title</div><input id="f-proTitle" value="${esc(a.proTitle||'')}" placeholder="Professional Soccer Player"></div>
      </div>
    </div>

    <!-- SOCIAL -->
    <div class="section">
      <div class="sec-hdr"><div class="sec-bar" style="background:var(--blue)"></div><span class="sec-label" style="color:var(--blue)">Social Media</span></div>
      <div class="grid3">
        <div class="field"><div class="label">Instagram</div><input id="f-instagram" value="${esc(a.instagram||'')}" placeholder="@username or full URL"></div>
        <div class="field"><div class="label">YouTube URL</div><input id="f-youtube" value="${esc(a.youtube||'')}" placeholder="https://youtube.com/..."></div>
        <div class="field"><div class="label">TikTok URL</div><input id="f-tiktok" value="${esc(a.tiktok||'')}" placeholder="https://tiktok.com/@..."></div>
      </div>
      <div class="grid3">
        <div class="field"><div class="label">X / Twitter URL</div><input id="f-twitter" value="${esc(a.twitter||'')}" placeholder="https://x.com/..."></div>
        <div class="field"><div class="label">Facebook URL</div><input id="f-facebook" value="${esc(a.facebook||'')}" placeholder="https://facebook.com/..."></div>
        <div class="field"><div class="label">ESPN Profile URL</div><input id="f-espnUrl" value="${esc(a.espnUrl||'')}" placeholder="https://espn.com/..."></div>
      </div>
    </div>

    <!-- HER STORY -->
    <div class="section">
      <div class="sec-hdr"><div class="sec-bar" style="background:var(--purple)"></div><span class="sec-label" style="color:var(--purple)">Her Story</span></div>

      <div class="grid2">
        <div class="field"><div class="label">Left Column Body</div><textarea id="f-storyLeft" rows="4" placeholder="Career depth, context, achievements...">${esc(a.storyLeft||'')}</textarea></div>
        <div class="field"><div class="label">Right Column Body</div><textarea id="f-storyRight" rows="4" placeholder="Defining moment, legacy, life after sport...">${esc(a.storyRight||'')}</textarea></div>

        <div class="story-cols">
          <div class="story-col" id="preview-left">${esc(a.storyLeft||'').replace(/\n/g,'<br>') || '<span style="color:#2a2a2a">Left column…</span>'}</div>
          <div class="story-col" id="preview-right">${esc(a.storyRight||'').replace(/\n/g,'<br>') || '<span style="color:#2a2a2a">Right column…</span>'}</div>

    <!-- TIMELINE -->

      <div class="sec-hdr"><div class="sec-bar" style="background:var(--blue)"></div><span class="sec-label" style="color:var(--blue)">Timeline Milestones</span><span style="color:#333;font-size:8px;margin-left:6px">${a._timeline.length} ITEMS</span></div>
      <div class="cards-list" id="timeline-list">${a._timeline.map((t,i)=>tmCard(t,i)).join('')}</div>
      <button class="add-btn" id="add-t-btn">+ Add Milestone</button>

    <!-- AWARDS -->
    <div class="section">
      <div class="sec-hdr"><div class="sec-bar" style="background:var(--amber)"></div><span class="sec-label" style="color:var(--amber)">Awards & Honors</span><span style="color:#333;font-size:8px;margin-left:6px">${a._awards.length} ITEMS</span></div>
      <div class="cards-list" id="awards-list">${a._awards.map((aw,i)=>awCard(aw,i)).join('')}</div>
      <button class="add-btn" id="add-a-btn">+ Add Award</button>
    </div>

    <!-- MEDIA -->
    <div class="section">
      <div class="sec-hdr"><div class="sec-bar" style="background:var(--purple)"></div><span class="sec-label" style="color:var(--purple)">Media</span><span style="color:#333;font-size:8px;margin-left:6px">${a._media.length} ITEMS</span></div>
      <div class="cards-list" id="media-list">${a._media.map((m,i)=>mdCard(m,i)).join('')}</div>
      <button class="add-btn" id="add-m-btn">+ Add Media Item</button>
    </div>

    <div style="height:40px"></div>
  

    <!-- Save button -->
    <div class="save-btn-wrap">
      <button id="save-btn" disabled>↓ SAVE ATHLETE TO SHEET</button>
    </div>
`;

  bindAll();
}

// ── Card templates ────────────────────────────────────────────────────────
function tmCard(t, i) {
  return `<div class="card" data-tid="${t.id}">
    <div class="card-hdr">
      <span class="card-num" style="color:var(--blue)">MILESTONE ${i+1}</span>
      <button class="rem-btn" data-rem-t="${t.id}">✕ Remove</button>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div class="field"><div class="label req">Year</div><input class="t-year" data-id="${t.id}" value="${esc(t.year)}" placeholder="1985"></div>
      <div class="field"><div class="label req">Title</div><input class="t-title" data-id="${t.id}" value="${esc(t.title)}" placeholder="Milestone headline"></div>
    </div>
    <div class="field" style="margin-bottom:10px">
      <div class="label">Description</div>
      <textarea class="t-desc1" data-id="${t.id}" rows="2" placeholder="Supporting context...">${esc(t.desc1||'')}</textarea>
    </div>
    <div class="field" style="margin-bottom:6px">
      <div class="label">Image</div>
      <div class="img-group">
        <input class="t-imageUrl" data-id="${t.id}" value="${esc(t.imageUrl||'')}" placeholder="Image URL">
        <div class="ig-row" style="margin-top:6px">
          <div>
            <div class="img-group-label">Alt Text</div>
            <input class="t-imageAlt" data-id="${t.id}" value="${esc(t.imageAlt||'')}" placeholder="Describe the image">
          </div>
          <div>
            <div class="img-group-label">Credit Source</div>
            <select class="t-imageCreditSource" data-id="${t.id}" onchange="toggleOtherCredit('t-imageCreditOther-wrap-'+this.dataset.id,this)">
              ${['Getty Images','AP Images','Reuters','Fox Sports','ESPN Images','Wikipedia / Wikimedia','Team / Club','Photographer','Other'].map(s=>`<option ${t.imageCreditSource===s?'selected':''}>${s}</option>`).join('')}
            </select>
            <div class="other-credit-wrap${!SELF_CREDIT.has(t.imageCreditSource)?' visible':''}" id="t-imageCreditOther-wrap-${t.id}">
              <div class="img-group-label other-credit-label">${CREDIT_LABELS[t.imageCreditSource]||'Specify'}</div>
              <input class="t-imageCreditOther" data-id="${t.id}" value="${esc(t.imageCreditOther||'')}" placeholder="">
            </div>
          </div>
        </div>
        <div style="margin-top:6px">
          <div class="img-group-label">Credit Name</div>
          <input class="t-imageCredit" data-id="${t.id}" value="${esc(t.imageCredit||'')}" placeholder="e.g. John Smith / Getty Images">
        </div>
      </div>
    </div>
  </div>`;
}

function awCard(aw, i) {
  return `<div class="card award-card">
    <div class="card-hdr">
      <span class="card-num" style="color:var(--amber)">AWARD ${i+1}</span>
      <button class="rem-btn" data-rem-a="${aw.id}">✕ Remove</button>
    </div>
    <div class="grid3">
      <div class="field"><div class="label req">Year(s)</div><input class="a-years" data-id="${aw.id}" value="${esc(aw.years)}" placeholder="1990, 1991"></div>
      <div class="field"><div class="label req">Category</div>
        <select class="a-category" data-id="${aw.id}">
          ${['Individual Awards','Team & Competition','Legacy'].map(c=>`<option ${aw.category===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="field"><div class="label req">Award Name</div><input class="a-name" data-id="${aw.id}" value="${esc(aw.name)}" placeholder="Award name"></div>
    </div>
  </div>`;
}

function mdCard(m, i) {
  return `<div class="card media-card">
    <div class="card-hdr">
      <span class="card-num" style="color:var(--purple)">MEDIA ${i+1}</span>
      <button class="rem-btn" data-rem-m="${m.id}">✕ Remove</button>
    </div>
    <div class="grid2" style="margin-bottom:10px">
      <div class="field"><div class="label req">URL</div><input class="m-url" data-id="${m.id}" value="${esc(m.url||'')}" placeholder="https://..."></div>
      <div class="field"><div class="label req">Source</div><input class="m-source" data-id="${m.id}" value="${esc(m.source||'')}" placeholder="storiedsports.com"></div>
    </div>
    <div class="field" style="margin-bottom:10px">
      <div class="label req">Title</div><input class="m-title" data-id="${m.id}" value="${esc(m.title||'')}" placeholder="Article or video title">
    </div>
    <div class="field">
      <div class="label">Description / Excerpt</div>
      <textarea class="m-description" data-id="${m.id}" rows="2" placeholder="Short excerpt...">${esc(m.description||'')}</textarea>
    </div>
  </div>`;
}

// ── Bind all events ───────────────────────────────────────────────────────
function bindAll() {
  // Bind save button (it lives inside form-area, created dynamically)
  const _sb = document.getElementById('save-btn');
  if(_sb) _sb.addEventListener('click', handleSave);
  // Text fields
  ['fullName','initials','slug','jerseyNumber','heroImageUrl','heroImageAlt','heroImageCredit','heroImageCreditSource','heroImageCreditOther',
   'sport','legend','position','era','yearsActive','nationality','hometown','college','teams','agent','proTitle',
   'instagram','youtube','tiktok','twitter','facebook','espnUrl','story','storyLeft','storyRight'
  ].forEach(f=>{
    const el = document.getElementById('f-'+f);
    if(el) el.addEventListener('input', ()=>{ current[f]=el.value; updateProgress(); });
  });

  // Add buttons
  document.getElementById('add-t-btn').addEventListener('click',()=>{
    current._timeline.push({id:rnd(),year:'',title:'',desc1:'',imageUrl:'',imageAlt:'',imageCredit:'',imageCreditSource:'Getty Images'});
    reRenderSection('timeline');
  });
  document.getElementById('add-a-btn').addEventListener('click',()=>{
    current._awards.push({id:rnd(),years:'',category:'Individual Awards',name:''});
    reRenderSection('awards');
  });
  document.getElementById('add-m-btn').addEventListener('click',()=>{
    current._media.push({id:rnd(),url:'',title:'',source:'',description:''});
    reRenderSection('media');
  });

  bindSubs();
}

function bindSubs() {
  // Timeline
  document.querySelectorAll('.t-year,.t-title,.t-desc1,.t-imageUrl,.t-imageAlt,.t-imageCredit,.t-imageCreditSource,.t-imageCreditOther').forEach(el=>{
    el.addEventListener('input',()=>{
      const t = current._timeline.find(x=>x.id===el.dataset.id);
      if(t) { const k=el.className.split(' ')[0].replace('t-',''); t[k]=el.value; }
    });
  });
  document.querySelectorAll('[data-rem-t]').forEach(btn=>{
    btn.addEventListener('click',()=>{ current._timeline=current._timeline.filter(x=>x.id!==btn.dataset.remT); reRenderSection('timeline'); });
  });
  // Awards
  document.querySelectorAll('.a-years,.a-category,.a-name').forEach(el=>{
    el.addEventListener('input',()=>{
      const a = current._awards.find(x=>x.id===el.dataset.id);
      if(a) { const k=el.className.split(' ')[0].replace('a-',''); a[k]=el.value; }
    });
  });
  document.querySelectorAll('[data-rem-a]').forEach(btn=>{
    btn.addEventListener('click',()=>{ current._awards=current._awards.filter(x=>x.id!==btn.dataset.remA); reRenderSection('awards'); });
  });
  // Media
  document.querySelectorAll('.m-url,.m-source,.m-title,.m-description').forEach(el=>{
    el.addEventListener('input',()=>{
      const m = current._media.find(x=>x.id===el.dataset.id);
      if(m) { const k=el.className.split(' ')[0].replace('m-',''); m[k]=el.value; }
    });
  });
  document.querySelectorAll('[data-rem-m]').forEach(btn=>{
    btn.addEventListener('click',()=>{ current._media=current._media.filter(x=>x.id!==btn.dataset.remM); reRenderSection('media'); });
  });
}

function reRenderSection(which) {
  if(which==='timeline'){
    document.getElementById('timeline-list').innerHTML=current._timeline.map(tmCard).join('');
  } else if(which==='awards'){
    document.getElementById('awards-list').innerHTML=current._awards.map(awCard).join('');
  } else if(which==='media'){
    document.getElementById('media-list').innerHTML=current._media.map(mdCard).join('');
  }
  bindSubs();
}

// ── Progress ──────────────────────────────────────────────────────────────
function updateProgress() {
  if(!current) return;
  const req=['fullName','initials','heroImageUrl','story'];
  const done=req.filter(f=>current[f]&&String(current[f]).trim()).length;
  const pct=Math.round(done/req.length*100);
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-lbl').textContent=pct+'%';
}

// ── Save ──────────────────────────────────────────────────────────────────
function handleSave() {
  if(!current) return;
  syncFormToCurrent();
  savedAthletes[current.fullName] = JSON.parse(JSON.stringify(current));
  persistSave();
  renderList(activeFilter, document.getElementById('sidebar-search').value);
  document.dispatchEvent(new CustomEvent('ihe:athleteSaved', { detail: JSON.parse(JSON.stringify(current)) }));
  const btn = document.getElementById('save-btn');
  if(!btn) return;
  btn.textContent='✓ SAVED TO SHEET';
  btn.classList.add('saved-flash');
  setTimeout(()=>{ btn.textContent='↓ SAVE ATHLETE TO SHEET'; btn.classList.remove('saved-flash'); }, 1800);
}

function syncFormToCurrent() {
  ['fullName','initials','slug','jerseyNumber','heroImageUrl','heroImageAlt','heroImageCredit','heroImageCreditSource','heroImageCreditOther',
   'sport','legend','position','era','yearsActive','nationality','hometown','college','teams','agent','proTitle',
   'instagram','youtube','tiktok','twitter','facebook','espnUrl','story','storyLeft','storyRight'
  ].forEach(f=>{ const el=document.getElementById('f-'+f); if(el) current[f]=el.value; });
}

// ── Export single ─────────────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', ()=>{
  if(!current){ alert('Select an athlete first.'); return; }
  syncFormToCurrent();
  exportToXLSX([current], (current.slug||slugify(current.fullName))+'.xlsx');
  const btn=document.getElementById('export-btn');
  btn.textContent='✓ EXPORTED!'; btn.classList.add('done');
  setTimeout(()=>{ btn.textContent='↓ EXPORT .XLSX'; btn.classList.remove('done'); },2200);
});

// ── Export all saved ──────────────────────────────────────────────────────
document.getElementById('export-all-btn').addEventListener('click', ()=>{
  const all = Object.values(savedAthletes);
  if(!all.length){ alert('No saved athletes yet. Save at least one first.'); return; }
  exportToXLSX(all, 'IHE_Athletes_Export.xlsx');
});

function exportToXLSX(athleteList, filename) {
  const wb = XLSX.utils.book_new();

  const aRows = athleteList.map(a=>({
    "Athlete ID":a.slug,"Full Name":a.fullName,"IHE Initials":a.initials,
    "Sport":a.sport,"Legend?":a.legend,"Jersey #":a.jerseyNumber,
    "Position":a.position,"Era":a.era,"Years Active":a.yearsActive,
    "Nationality":a.nationality,"Hometown":a.hometown,"College":a.college,
    "Teams":a.teams,"Agent":a.agent,"Pro Title":a.proTitle,
    "Instagram":a.instagram,"YouTube":a.youtube,"TikTok":a.tiktok,
    "X/Twitter":a.twitter,"Facebook":a.facebook,"ESPN URL":a.espnUrl,
    "Hero Image URL":a.heroImageUrl,"Hero Image Alt":a.heroImageAlt,
    "Hero Image Credit":a.heroImageCredit,"Hero Image Credit Source":a.heroImageCreditSource,"Hero Image Credit (Other)":a.heroImageCreditOther||'',
    "Wiki URL":a.wikiUrl,"Wiki Photo":a.wikiPhoto,"Getty URL":a.gettyUrl,
    "Story (Full)":a.story,"Story Left":a.storyLeft,"Story Right":a.storyRight,
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(aRows), "Athletes");

  const tRows = athleteList.flatMap(a=>(a._timeline||[]).map(t=>({
    "Athlete":a.fullName,"Year":t.year,"Title":t.title,"Description":t.desc1,
    "Image URL":t.imageUrl,"Image Alt":t.imageAlt,"Image Credit":t.imageCredit,"Image Credit Source":t.imageCreditSource
  })));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(tRows.length?tRows:[{}]), "Timeline");

  const awRows = athleteList.flatMap(a=>(a._awards||[]).map(aw=>({
    "Athlete":a.fullName,"Year(s)":aw.years,"Category":aw.category,"Award":aw.name
  })));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(awRows.length?awRows:[{}]), "Awards");

  const mRows = athleteList.flatMap(a=>(a._media||[]).map(m=>({
    "Athlete":a.fullName,"URL":m.url,"Title":m.title,"Source":m.source,"Description":m.description
  })));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(mRows.length?mRows:[{}]), "Media");

  // JSON sheet for devs
  const jsonRows = athleteList.map(a=>({ "Athlete": a.fullName, "JSON": JSON.stringify(a) }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(jsonRows), "JSON (Devs)");

  XLSX.writeFile(wb, filename);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }



function toggleOtherCredit(wrapId, selectEl) {
  const wrap = document.getElementById(wrapId);
  if (!wrap) return;
  const val = selectEl.value;
  const needsExtra = !SELF_CREDIT.has(val);
  wrap.classList.toggle('visible', needsExtra);
  const lbl = wrap.querySelector('.other-credit-label');
  if (lbl) lbl.textContent = CREDIT_LABELS[val] || 'Specify';
  if (!needsExtra) {
    const inp = wrap.querySelector('input');
    if (inp) inp.value = '';
  }
}

// ── New Athlete ────────────────────────────────────────────────────────────
document.getElementById('new-athlete-btn').addEventListener('click', ()=>{
  const name = prompt('Enter the athlete\'s full name:');
  if(!name || !name.trim()) return;
  const trimmed = name.trim();
  if(DB_RAW.find(a=>a.fullName.toLowerCase()===trimmed.toLowerCase())) {
    alert(trimmed + ' already exists in the database. Select them from the list instead.');
    return;
  }
  // Add to DB_RAW so they appear in the list
  const newAthlete = {
    fullName: trimmed, sport:'', legend:'', story:'', timeline:'', awards:'',
    wikiUrl:'', wikiPhoto:'', gettyUrl:'', position:'', era:'', teams:'',
    college:'', hometown:'', nationality:'', yearsActive:'', jerseyNumber:'',
    espnUrl:'', instagram:'', _sport:'Other Sports', _isNew:true
  };
  DB_RAW.push(newAthlete);
  renderList(activeFilter, document.getElementById('sidebar-search').value);
  selectAthlete(trimmed);
  document.getElementById('save-btn').disabled = false;
});
