ikipedia/commons/b/b5/Christine_Sinclair_2016_%283x4_cropped%29.jpg","heroImageAlt":"Christine Sinclair in Canada national team jersey — world all-time international goals record holder with 190 goals","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Having played over 20 seasons with the senior national team, Sinclair has participated in six FIFA Women's World Cups (United States 2003, China 2007, Germany 2011, Canada 2015, France 2019, Australia and New Zealand 2023) and four Olympic football tournaments (Beijing 2008, London 2012, Rio 2016, Tokyo 2020), captaining the national team to third-place finishes in 2012 and 2016 and first place in 2020. She is one of three players to score at five World Cup editions, alongside Marta and Cristiano Ronaldo.","storyRight":"At the club level, Sinclair has won championships with three professional teams: the 2010 WPS Championship with FC Gold Pride, the 2011 WPS Championship with Western New York Flash, and the 2013, 2017, and 2022 NWSL Championships with Portland Thorns FC. She won the national collegiate Division I championship twice (2002, 2005) with the University of Portland.","_sport":""},{"fullName":"Megan Rapinoe","sport":"Soccer","legend":"Yes","story":"Megan Anna Rapinoe ( ; born July 5, 1985) is an American former professional soccer player who played as a midfielder and winger. She spent most of her career playing for Seattle Reign FC of the National Women's Soccer League (NWSL) and the United States national team.","timeline":"Megan Anna Rapinoe ( ; born July 5, 1985) is an American former professional soccer player who played as a midfielder and winger.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Megan_Rapinoe","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/b/b7/Megan_Rapinoe_%2848675274817%29_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Megan+Rapinoe","position":"Midfielder winger","era":"Legacy","teams":"Seattle Reign FC, United States women's national soccer team","college":"","hometown":"Redding, California , U.S.","nationality":"American","yearsActive":"1985–2022","jerseyNumber":"15","espnUrl":"https://www.espn.com/soccer/player/_/id/158775/megan-rapinoe","instagram":"mrapinoe","initials":"Mr","slug":"megan-rapinoe","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/b/b7/Megan_Rapinoe_%2848675274817%29_%28cropped%29.jpg","heroImageAlt":"Megan Rapinoe in USWNT jersey — Ballon d'Or winner and two-time World Cup champion","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Winner of the Ballon d'Or Féminin and named The Best FIFA Women's Player in 2019, Rapinoe was a member of the national teams that won the FIFA Women's World Cup in 2015 and 2019, and the team that finished second in 2011. She also won gold at the Olympics in 2012.","storyRight":"Rapinoe co-captained the national team alongside Carli Lloyd and Alex Morgan from 2018 to 2020. She previously played for the Chicago Red Stars, Philadelphia Independence, and magicJack in Women's Professional Soccer (WPS), as well as Lyon Women in France's Division 1 Féminine.","_sport":""},{"fullName":"Alexia Putellas","sport":"Soccer","legend":"No","story":"Alèxia Putellas i Segura (Catalan pronunciation: [əˈlɛksiə puˈteʎə səˈɣuɾə] (); Spanish: Alexia Putellas Segura; born 4 February 1994), often known mononymously as Alexia, is a Spanish professional footballer from Catalonia who plays as a midfielder or forward for Liga F club Barcelona, which she captains, and the Spain women's national team. She previously played for Espanyol and Levante, and has represented Catalonia.","timeline":"Alèxia Putellas i Segura (Catalan pronunciation: [əˈlɛksiə puˈteʎə səˈɣuɾə] (); Spanish: Alexia Putellas Segura; born 4 February 1994), often known mononymously as Alexia, is a Spanish professional footballer from Catalonia who plays as a midfielder or forward for Liga F club Barcelona, which she captains, and the Spain women's national team.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Alexia_Putellas","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/0/06/Brann_-_Bar%C3%A7a_Femen%C3%AD_CG3A5851_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Alexia+Putellas","position":"Midfielder","era":"Current","teams":"Catalonia women's national football team, Spain women's national association football team","college":"","hometown":"Mollet del Vallès , Catalonia , Spain [ 2 ]","nationality":"Spanish","yearsActive":"1994–2023","jerseyNumber":"11","espnUrl":"https://www.espn.com/soccer/player/_/id/219995/alexia-putellas","instagram":"alexiaputellas","initials":"Ap","slug":"alexia-putellas","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/0/06/Brann_-_Bar%C3%A7a_Femen%C3%AD_CG3A5851_%28cropped%29.jpg","heroImageAlt":"Alexia Putellas in FC Barcelona kit — two-time Ballon d'Or Féminin winner","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Having won all major club and most of the individual awards available to a European player by 2022, she is widely regarded as one of the greatest female footballers of all time. Putellas started her youth career at CE Sabadell, passing through Barcelona before she moved to Espanyol, where she played most of her youth football.","storyRight":"After a year at Levante she returned to Barcelona in 2012, where she has won eight league titles, eight Copas de la Reina and three UEFA Women's Champions League trophies. In Barcelona's 2020–21 season, she played an essential role as her team won the Champions League as well as the resulting continental treble, both for the first time in their history.","_sport":""},{"fullName":"Aitana Bonmatí","sport":"Soccer","legend":"No","story":"Aitana Bonmatí i Conca (Catalan: [əjˈtanə ˌβɔmməˈti j ˈkoŋkə] ; born 18 January 1998) is a Spanish professional footballer from Catalonia who plays as a midfielder for Liga F club Barcelona and the Spain national team. She has also represented Catalonia.","timeline":"Aitana Bonmatí i Conca (Catalan: [əjˈtanə ˌβɔmməˈti j ˈkoŋkə] ; born 18 January 1998) is a Spanish professional footballer from Catalonia who plays as a midfielder for Liga F club Barcelona and the Spain national team.","awards":"Individual Awards\n2x Ballon d'Or Féminin (2023, 2024)\n2x The Best FIFA Women's Player (2023, 2024)\n2x UEFA Women's Player of the Year\nTeam & Competition\nFIFA Women's World Cup Champion (2023)\nMultiple UEFA Women's Champions League titles","wikiUrl":"https://en.wikipedia.org/wiki/Aitana_Bonmat%C3%AD","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/8/8f/25th_Laureus_World_Sports_Awards_-_240422_214032.jpg","gettyUrl":"https://www.gettyimages.com/photos/Aitana+Bonmat%C3%AD","position":"Midfielder","era":"Current","teams":"Catalonia women's national football team, Spain women's national association football team","college":"","hometown":"Vilanova i la Geltrú , Catalonia, Spain","nationality":"Spanish","yearsActive":"1998–2025","jerseyNumber":"14","espnUrl":"https://www.espn.com/soccer/player/_/id/268537/aitana-bonmati","instagram":"aitanabonmati","initials":"Ab","slug":"aitana-bonmat","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/8/8f/25th_Laureus_World_Sports_Awards_-_240422_214032.jpg","heroImageAlt":"Aitana Bonmatí at the Laureus Awards — two-time Ballon d'Or winner and World Cup champion with Spain","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Having won all major club and individual awards available to a European player by 2023, including the most-decorated season of any footballer ever for 2022–23, she is considered one of the best players in women's football, and one of the greatest of all time. Bonmatí has been with Barcelona since 2012, developing through La Masia for six years.","storyRight":"She was promoted to Barcelona's first team ahead of the 2016–17 season, and made off-the-bench appearances for the club until her break-out year in the 2018–19 season. With the team she has won five league titles, six Copas de la Reina, five Supercopas, four Copas Catalunyas and three UEFA Women's Champions League titles, including three trebles and a continental quadruple.","_sport":""},{"fullName":"Lucy Bronze","sport":"Soccer","legend":"No","story":"Lucia Roberta Tough Bronze (born 28 October 1991) is an English professional footballer who plays as a right-back for Women's Super League club Chelsea and the England women's national team. She has previously played for Sunderland, Everton, Liverpool, Lyon, Manchester City and Barcelona, as well as North Carolina at college level in the United States and Great Britain at the Olympics.","timeline":"Lucia Roberta Tough Bronze (born 28 October 1991) is an English professional footballer who plays as a right-back for Women's Super League club Chelsea and the England women's national team.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Lucy_Bronze","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/4/4e/20250510-Lucy_Bronze_%28cropped_-_portrait%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Lucy+Bronze","position":"Right-back [ 2 ] right wing-back","era":"Current","teams":"England women's national football team","college":"","hometown":"Berwick-upon-Tweed , England","nationality":"English","yearsActive":"1991–2025","jerseyNumber":"22","espnUrl":"https://www.espn.com/soccer/player/_/id/188448/lucy-bronze","instagram":"lucybronze","initials":"Lb","slug":"lucy-bronze","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/4/4e/20250510-Lucy_Bronze_%28cropped_-_portrait%29.jpg","heroImageAlt":"Lucy Bronze in England national team kit — UEFA Euro champion and five-time Champions League winner","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Bronze has won a total of five Champions League titles, three with Lyon and two with Barcelona; four Women's Super League titles, with Liverpool, Manchester City and Chelsea; and both the Euro 2022 and the Euro 2025 with England. Bronze represented England from under-17 level and has been part of the senior national team at every major tournament since the Euro 2013, having first captained them in 2018.","storyRight":"She won the Silver Ball at the 2019 World Cup in France, helping England to a fourth-place finish. Bronze was named to the All-Star Squads at the 2015 World Cup in Canada, in which England finished third, as well as the Euro 2017 in the Netherlands and the 2019 World Cup.","_sport":""},{"fullName":"Sophia Wilson","sport":"Soccer","legend":"No","story":"Sophia Smith grew up in Windsor, Colorado, a small town where soccer became her obsession before she could articulate why. She was the top recruit in the country out of high school, won a national championship at Stanford in 2019, and was taken first overall by the Portland Thorns in the 2020 NWSL draft.","timeline":"","awards":"","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"","era":"Current","teams":"","college":"","hometown":"","nationality":"","yearsActive":"","jerseyNumber":"9","espnUrl":"","instagram":"","initials":"Ss","slug":"sophia-wilson","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/b/b0/Sophia_Smith_2024-02_%28cropped%29.jpg","heroImageAlt":"Sophia Smith Wilson, Portland Thorns forward and NWSL MVP — scored the Paris Olympics final winner","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"What followed was one of the most rapid ascents in the league's history. By 2022 she had led the Thorns to the NWSL Championship and was named both league MVP and Championship MVP. She received the Golden Boot as the league's top scorer in 2023. At 23 she had already done what most players spend a decade working toward.","storyRight":"She scored the only goal in the 2024 Paris Olympics final, the moment that announced her arrival as one of the most important players in the women's game. She married Chicago Cubs player Dansby Swanson, taking his name, and moved into a new chapter of her career with the same relentless ambition that had defined every step before it.","_sport":""},{"fullName":"Trinity Rodman","sport":"Soccer","legend":"No","story":"Trinity Rain Moyer-Rodman (born May 20, 2002) is an American professional soccer player who plays as a forward for the Washington Spirit of the National Women's Soccer League (NWSL) and the United States national team. Rodman was the second overall pick by the Spirit in the 2021 NWSL Draft, becoming the NWSL's youngest draftee at the time at age 18.","timeline":"Trinity Rain Moyer-Rodman (born May 20, 2002) is an American professional soccer player who plays as a forward for the Washington Spirit of the National Women's Soccer League (NWSL) and the United States national team.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Trinity_Rodman","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/8/8f/Trinity_Rodman_USWNT_v_Colombia_Mar_7_2026-87_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Trinity+Rodman","position":"Forward","era":"Rising","teams":"Washington Spirit","college":"","hometown":"Newport Beach, California , United States [ 3 ]","nationality":"American","yearsActive":"2002–2024","jerseyNumber":"2","espnUrl":"https://www.espn.com/soccer/player/_/id/317423/trinity-rodman","instagram":"trinity_rodman","initials":"Tr","slug":"trinity-rodman","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/8/8f/Trinity_Rodman_USWNT_v_Colombia_Mar_7_2026-87_%28cropped%29.jpg","heroImageAlt":"Trinity Rodman in USWNT jersey — Washington Spirit forward and Olympic gold medalist","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She helped the club win the NWSL Championship and was named the NWSL Rookie of the Year and NWSL Best XI First Team in her debut season. She has been named to the NWSL Best XI three times with the Spirit.","storyRight":"Rodman was named the U.S. Soccer Young Female Player of the Year in 2021, making her senior debut for the United States the following year.","_sport":""},{"fullName":"Mallory Swanson","sport":"Soccer","legend":"No","story":"Mallory Diane Swanson (née Pugh; born April 29, 1998) is an American professional soccer player who plays as a forward for the Chicago Stars FC of the National Women's Soccer League (NWSL) and the United States women's national soccer team (USWNT). After playing extensively at the under-17 and under-20 level, Swanson debuted for the USWNT in 2016 at age 17, becoming the team's youngest player since Heather O'Reilly in 2002.","timeline":"Mallory Diane Swanson (née Pugh; born April 29, 1998) is an American professional soccer player who plays as a forward for the Chicago Stars FC of the National Women's Soccer League (NWSL) and the United States women's national soccer team (USWNT).","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Mallory_Swanson","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/6/69/NC_Courage_vs_Chicago_Red_Stars_%28Jun_2024%29_037_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Mallory+Swanson","position":"Forward","era":"Current","teams":"United States women's national soccer team","college":"","hometown":"Littleton, Colorado , U.S. [ 3 ]","nationality":"American","yearsActive":"1998–2024","jerseyNumber":"9","espnUrl":"https://www.espn.com/soccer/player/_/id/233163/mallory-swanson","instagram":"malpugh","initials":"Ms","slug":"mallory-swanson","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/6/69/NC_Courage_vs_Chicago_Red_Stars_%28Jun_2024%29_037_%28cropped%29.jpg","heroImageAlt":"Mallory Swanson in NWSL action — USWNT forward who scored the winning goal at the 2024 Paris Olympics","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Later that year she represented the United States at the 2016 Summer Olympics in Rio de Janeiro, where she became the youngest Olympic goalscorer for the United States. She won the 2019 FIFA Women's World Cup and gold at the 2024 Paris Olympics, scoring the only goal in the Olympic final.","storyRight":"Swanson elected to forego her college career at UCLA to turn professional in 2017, signing with the Washington Spirit, where she stayed for three seasons before playing at Sky Blue FC. She was then traded to the Chicago Red Stars, playing in the same city as her husband, Chicago Cubs baseball player Dansby Swanson.","_sport":""},{"fullName":"Lindsey Heaps","sport":"Soccer","legend":"No","story":"Lindsey Horan took the road nobody takes. At 17 she was one of the top recruits in the country, committed to UCLA, and then turned down her scholarship to sign a professional contract with Paris Saint-Germain instead. No American woman had done that before. She played in France's top division for four years while her peers were playing college ball, scoring 22 goals before returning to the United States in 2016.","timeline":"","awards":"","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Midfielder","era":"Current","teams":"","college":"","hometown":"Golden, Colorado","nationality":"American","yearsActive":"2012–present","jerseyNumber":"10","espnUrl":"","instagram":"","initials":"Lh","slug":"lindsey-heaps","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/a/a9/Lindsey_Heaps_USWNT_vs_Italy_Nov_28_2025-047_%28cropped%29.jpg","heroImageAlt":"Lindsey Horan captaining the USWNT — midfielder and Lyon star","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She joined the Portland Thorns and became one of the best midfielders in the NWSL, winning MVP in 2018 and a championship in 2022. For the USWNT she became captain under Vlatko Andonovski and later Emma Hayes, the engine of a team that won the 2024 Paris Olympics gold medal. She spent six seasons at Lyon before returning to the US to help launch Denver Summit FC.","storyRight":"Horan's game is built on relentlessness. She presses until she wins the ball back, then distributes it with the composure of a player twice her age. She is one of the few players in the world who can dominate a game physically and technically at the same time.","_sport":""},{"fullName":"Alyssa Naeher","sport":"Soccer","legend":"No","story":"Alyssa Michele Naeher ( NAIR; born April 20, 1988) is an American professional soccer player who plays as a goalkeeper for Chicago Stars FC of the National Women's Soccer League (NWSL). Naeher played college soccer for the Penn State Nittany Lions, earning two-time first-team All-American honors.","timeline":"Alyssa Michele Naeher ( NAIR; born April 20, 1988) is an American professional soccer player who plays as a goalkeeper for Chicago Stars FC of the National Women's Soccer League (NWSL).","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Alyssa_Naeher","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/4/42/NC_Courage_vs_Chicago_Stars_%28May_2025%29_045_%28cropped%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Alyssa+Naeher","position":"Goalkeeper","era":"Current","teams":"Boston Breakers, United States women's national soccer team","college":"","hometown":"Bridgeport, Connecticut , U.S.","nationality":"American","yearsActive":"1988–2024","jerseyNumber":"1","espnUrl":"https://www.espn.com/soccer/player/_/id/219043/alyssa-naeher","instagram":"alyssanaeher","initials":"An","slug":"alyssa-naeher","proTitle":"Professional Soccer Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/4/42/NC_Courage_vs_Chicago_Stars_%28May_2025%29_045_%28cropped%29.jpg","heroImageAlt":"Alyssa Naeher, USWNT starting goalkeeper since 2016 and World Cup champion","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She began her professional career with the Boston Breakers in Women's Professional Soccer in 2010, but when the league folded, she went to Turbine Potsdam in Germany. She returned to the Boston Breakers when the NWSL formed and was named NWSL Goalkeeper of the Year in 2014.","storyRight":"She has been the starting goalkeeper for Chicago since 2016. Naeher made 115 appearances for the United States national team between 2014 and 2024.","_sport":""},{"fullName":"Cammi Granato","sport":"Hockey","legend":"Yes","story":"Catherine Michelle Granato (born March 25, 1971) is an American former ice hockey player and one of the first women to be inducted into the Hockey Hall of Fame in November 2010. She currently works as an assistant general manager for the Vancouver Canucks organization.","timeline":"Catherine Michelle Granato (born March 25, 1971) is an American former ice hockey player and one of the first women to be inducted into the Hockey Hall of Fame in November 2010.","awards":"Individual Awards\nUS Olympic Committee Female Athlete of the Year (1998)\nHockey Hall of Fame (2010)\nTeam & Competition\nOlympic Gold Medal (1998)\nMultiple IIHF Women's World Championship medals","wikiUrl":"https://en.wikipedia.org/wiki/Cammi_Granato","wikiPhoto":"","gettyUrl":"https://www.gettyimages.com/photos/Cammi+Granato","position":"Right wing / Center","era":"Legacy","teams":"United States women's national ice hockey team","college":"","hometown":"Downers Grove, Illinois, U.S.","nationality":"American","yearsActive":"1990–2005","jerseyNumber":"","espnUrl":"https://www.espn.com/hockey/player/_/id/330847/cammi-granato","instagram":"","initials":"Cg","slug":"cammi-granato","proTitle":"Professional Ice Hockey Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Cammi_Granato_2007.jpg/440px-Cammi_Granato_2007.jpg","heroImageAlt":"Cammi Granato, captain of the 1998 US Olympic gold medal women's hockey team","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Granato was the captain of the U.S. women's hockey team that won a gold medal in the 1998 Winter Olympics.","storyRight":"She is the younger sister of former NHL player Tony Granato and former Buffalo Sabres head coach Don Granato, and a graduate of Providence College. Granato played hockey for Concordia University in Montreal, Quebec, Canada.","_sport":""},{"fullName":"Jenny Potter","sport":"Hockey","legend":"Yes","story":"Jennifer Lynn Schmidgall-Potter (born January 12, 1979) is an American former ice hockey player. She was a member of the United States women's national ice hockey team.","timeline":"Jennifer Lynn Schmidgall-Potter (born January 12, 1979) is an American former ice hockey player.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Jenny_Schmidgall-Potter","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/b/b0/Jenny_Potter_at_2010_Winter_Olympics_US_Women%27s_Hockey_press_event.jpg","gettyUrl":"https://www.gettyimages.com/photos/Jenny+Potter","position":"Forward","era":"Legacy","teams":"United States women's national ice hockey team","college":"","hometown":"Saint Paul, Minnesota, U.S.","nationality":"American","yearsActive":"1998–2015","jerseyNumber":"","espnUrl":"","instagram":"","initials":"Jp","slug":"jenny-potter","proTitle":"Professional Ice Hockey Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/b/b0/Jenny_Potter_at_2010_Winter_Olympics_US_Women%27s_Hockey_press_event.jpg","heroImageAlt":"Jenny Potter at the 2010 Winter Olympics — US Women's Hockey forward and four-time Olympic medalist","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She won a gold medal at the 1998 Winter Olympics, silver medals at the 2002 Winter Olympics and 2010 Winter Olympics, and a bronze medal at the 2006 Winter Olympics. After, she played for the Minnesota Whitecaps of the Western Women's Hockey League, where she won the league championship and was named MVP for the 2008–09 season.","storyRight":"She was selected to the 2010 US Olympic team and was the only mother on the team.","_sport":""},{"fullName":"Hayley Wickenheiser","sport":"Hockey","legend":"Yes","story":"Hayley Wickenheiser (born August 12, 1978) is a Canadian former ice hockey player, physician and assistant general manager for the Toronto Maple Leafs. She was the first woman to play full-time professional men’s hockey in a position other than goalie.","timeline":"Hayley Wickenheiser (born August 12, 1978) is a Canadian former ice hockey player, physician and assistant general manager for the Toronto Maple Leafs.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Hayley_Wickenheiser","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/1/1f/Hayley_Wickenheiser_%2817378332249%29.jpg","gettyUrl":"https://www.gettyimages.com/photos/Hayley+Wickenheiser","position":"Centre","era":"Legacy","teams":"Canada women's national ice hockey team","college":"","hometown":"Shaunavon, Saskatchewan, Canada","nationality":"Canadian","yearsActive":"1993–2017","jerseyNumber":"","espnUrl":"","instagram":"hchickwick","initials":"Hw","slug":"hayley-wickenheiser","proTitle":"Professional Ice Hockey Player & Physician","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/1/1f/Hayley_Wickenheiser_%2817378332249%29.jpg","heroImageAlt":"Hayley Wickenheiser in Team Canada jersey — widely considered the greatest women's hockey player of all time","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Wickenheiser was a member of Canada women's national ice hockey team for 23 years, from 1994 until announcing her retirement on January 13, 2017, and is the team's career points leader with 168 goals and 211 assists in 276 games. She represented Canada at the Winter Olympics five times, capturing four gold and one silver medal and twice being named tournament MVP, and one time at the Summer Olympics in softball, and is a seven-time winner of the world championships.","storyRight":"She is tied with teammates Caroline Ouellette and Jayna Hefford for the record for the most gold medals of any Canadian Olympian, and is widely considered to be the greatest women's ice hockey player of all time. On February 20, 2014, Wickenheiser was elected to the International Olympic Committee's Athletes' Commission.","_sport":""},{"fullName":"Aerin Frankel","sport":"Hockey","legend":"No","story":"Aerin Jordan Frankel (born May 24, 1999) is an American professional ice hockey goaltender for the Boston Fleet of the Professional Women's Hockey League (PWHL) and member of the United States women's national ice hockey team. She is a two-time IIHF Women's World Championship gold medalist (2023, 2025) and silver medalist (2024), having served as Team USA's primary goaltender at three consecutive World Championships.","timeline":"Aerin Jordan Frankel (born May 24, 1999) is an American professional ice hockey goaltender for the Boston Fleet of the Professional Women's Hockey League (PWHL) and member of the United States women's national ice hockey team.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Aerin_Frankel","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/b/be/Aerin_Frankel_2024.jpg","gettyUrl":"https://www.gettyimages.com/photos/Aerin+Frankel","position":"Goaltender","era":"Current","teams":"Boston Fleet","college":"","hometown":"Briarcliff Manor, New York, U.S.","nationality":"American","yearsActive":"2017–present","jerseyNumber":"","espnUrl":"","instagram":"aerin.frankel","initials":"Af","slug":"aerin-frankel","proTitle":"Professional Ice Hockey Goaltender","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/b/be/Aerin_Frankel_2024.jpg","heroImageAlt":"Aerin Frankel, Boston Fleet goaltender — first US women's goalie to record Olympic shutout against Canada","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Frankel became the first U.S. women's goaltender to start five consecutive games at an Olympics or World Championship in 26 years during the 2023 tournament.","storyRight":"On February 10, 2026, she became the first American goaltender to record a shutout against Canada at the Olympics. In college hockey, Frankel was one of the most decorated goaltenders in NCAA history.","_sport":""},{"fullName":"Alina Muller","sport":"Hockey","legend":"No","story":"Alina Müller became the youngest Olympic medal winner in ice hockey history at 15 years old. She scored the game-winning goal for Switzerland in the bronze medal game at the 2014 Sochi Winter Olympics, a moment that announced the arrival of a player the sport would be watching for decades.","timeline":"","awards":"","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"","era":"Current","teams":"","college":"","hometown":"","nationality":"","yearsActive":"","jerseyNumber":"","espnUrl":"","instagram":"","initials":"AM","slug":"alina-muller","proTitle":"Professional Ice Hockey Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/9/99/Alina_M%C3%BCller_Boston_Fleet_2025.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Müller grew up in Lengnau, Switzerland, and played her college hockey at Northeastern, where she became one of the most decorated players in NCAA history. She joined the Boston Fleet of the PWHL and brought Swiss national team excellence to North America's top professional league.","storyRight":"In 2026 she repeated the feat, scoring the game-winning goal for Switzerland in the bronze medal game at the Milan Olympics at age 27. Two Olympics, two bronze medals, two game-winning goals. The symmetry is almost too perfect to be accidental.","_sport":""},{"fullName":"Ann-Marie Desbiens","sport":"Hockey","legend":"No","story":"Ann-Marie Desbiens is one of the most decorated goaltenders in Canadian hockey history. She played her college career at Wisconsin before joining the Montreal Victoire of the PWHL, where she became one of the most technically refined goaltenders in the professional women's game.","timeline":"","awards":"","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"","era":"Current","teams":"","college":"","hometown":"","nationality":"","yearsActive":"","jerseyNumber":"1","espnUrl":"","instagram":"amdesbiens","initials":"AD","slug":"ann-marie-desbiens","proTitle":"Professional Ice Hockey Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Ann-Marie_Desbiens.jpg/440px-Ann-Marie_Desbiens.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"With Team Canada's national team she has won multiple World Championship gold medals and an Olympic gold medal at the 2022 Beijing Games. She is known for her positioning, her calmness under pressure, and her ability to make difficult saves look routine.","storyRight":"Desbiens has become a central figure in the growth of the PWHL and Canadian women's hockey, representing the standard of excellence the sport expects from its best players.","_sport":""},{"fullName":"Renata Fast","sport":"Hockey","legend":"No","story":"Renata Fast (born October 6, 1994) is a Canadian professional ice hockey defender for the Toronto Sceptres of the Professional Women's Hockey League (PWHL) and a member of the Canada women's national ice hockey team. She is a two-time Olympic medallist, having won silver at the 2018 Winter Olympics in PyeongChang and gold at the 2022 Winter Olympics in Beijing.","timeline":"Renata Fast (born October 6, 1994) is a Canadian professional ice hockey defender for the Toronto Sceptres of the Professional Women's Hockey League (PWHL) and a member of the Canada women's national ice hockey team.","awards":"","wikiUrl":"https://en.wikipedia.org/wiki/Renata_Fast","wikiPhoto":"https://upload.wikimedia.org/wikipedia/commons/9/98/Renata_Fast_2024.jpg","gettyUrl":"https://www.gettyimages.com/photos/Renata+Fast","position":"Defence","era":"Current","teams":"Toronto Sceptres","college":"","hometown":"Hamilton, Ontario, Canada","nationality":"Canadian","yearsActive":"2010–present","jerseyNumber":"","espnUrl":"","instagram":"renatafast","initials":"Rf","slug":"renata-fast","proTitle":"Professional Ice Hockey Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/9/98/Renata_Fast_2024.jpg","heroImageAlt":"Renata Fast of Toronto Sceptres — PWHL Defender of the Year and Olympic gold medalist","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Fast has won seven medals at the IIHF Women's World Championship, including gold medals in 2021, 2022, and 2024. At the 2024 World Championship, she was named Best Defender and selected to the Media All-Star team.","storyRight":"Fast won the 2024–25 PWHL Defender of the Year Award and was named a finalist for the Billie Jean King Most Valuable Player Award after leading the league in assists (16) and time on ice among defencemen. She was also a two-time PWHL All-Star.","_sport":""},{"fullName":"Alex Carpenter","sport":"Hockey","legend":"No","story":"Alex Carpenter is one of the most naturally gifted offensive players in women's hockey. The daughter of NHL veteran Bob Carpenter, she grew up around professional hockey and developed a complete offensive game that made her one of the most dangerous forwards of her generation.","timeline":"","awards":"","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"","era":"Current","teams":"","college":"","hometown":"","nationality":"","yearsActive":"","jerseyNumber":"25","espnUrl":"","instagram":"alexcarpenter25","initials":"AC","slug":"alex-carpenter","proTitle":"Professional Ice Hockey Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Alex_Carpenter_2022.jpg/440px-Alex_Carpenter_2022.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She played at Boston College before joining Team USA, where she has represented the United States at multiple World Championships and Olympic Games. She has won multiple World Championship gold medals and was part of the gold-medal winning team at the 2018 PyeongChang Olympics.","storyRight":"Carpenter has spent her professional career in the PWHL and its predecessor leagues, consistently among the league's most productive forwards. Her skating, finishing, and playmaking ability have made her one of the most complete offensive players in the history of women's hockey.","_sport":""},{"fullName":"Julie Chu","sport":"Hockey","legend":"Yes","story":"Julie Chu is one of the most decorated American women's hockey players in history. Born in Fairfield, Connecticut, she played her college career at Harvard, where she became one of the most accomplished players in Crimson history before embarking on a four-Olympics career with Team USA.","timeline":"","awards":"","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"","era":"Legacy","teams":"","college":"","hometown":"","nationality":"","yearsActive":"","jerseyNumber":"13","espnUrl":"","instagram":"juliechu_13","initials":"JC","slug":"julie-chu","proTitle":"Professional Ice Hockey Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Julie_Chu_2010.jpg/440px-Julie_Chu_2010.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She won silver medals at the 2002, 2010, and 2014 Olympics and a bronze medal at the 2006 Games. She is one of only a handful of American players to appear in four Olympic Games, and one of the most recognizable faces in women's hockey during its most competitive era.","storyRight":"After retiring as a player, Chu transitioned into coaching and advocacy, working to develop the game at the youth and collegiate levels and continuing to serve as an ambassador for women's hockey globally.","_sport":""},{"fullName":"Abbey Roque","sport":"Hockey","legend":"No","story":"Abbey Roque grew up in Delafield, Wisconsin and became one of the most exciting offensive players in American women's hockey. She played at the University of Wisconsin before joining the national team and the PWHL, where her speed and creativity made her one of the most dangerous forwards in the league.","timeline":"","awards":"","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"","era":"Current","teams":"","college":"","hometown":"","nationality":"","yearsActive":"","jerseyNumber":"14","espnUrl":"","instagram":"abbey_roque","initials":"AR","slug":"abbey-roque","proTitle":"Professional Ice Hockey Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Abbey_Roque_2022.jpg/440px-Abbey_Roque_2022.jpg","heroImageAlt":"","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Roque won a gold medal with Team USA at the 2026 Milan Winter Olympics, part of a young American team that ended a long gold medal drought. She is one of the sport's brightest young players and represents the next generation of American women's hockey excellence.","storyRight":"With her natural skill and competitive drive, Roque has established herself as a cornerstone of Team USA's future plans.","_sport":""},{"fullName":"Billie Jean King","sport":"Tennis","legend":"Yes","story":"Billie Jean King didn't just change tennis. She changed the conversation around what women deserved. Born in Long Beach, California, she became one of the most dominant players of her era — winning 39 Grand Slam titles — but her most important victories happened off the court.","timeline":"1966 Wins first Wimbledon singles title\n1970 Threatens to boycott US Open over unequal prize money — sparks reform\n1973 Beats Bobby Riggs in the Battle of the Sexes before 90 million TV viewers\n1973 Co-founds the Women's Tennis Association\n1987 Inducted into the International Tennis Hall of Fame\n2006 USTA National Tennis Center renamed in her honor","awards":"Individual Awards\n12 Grand Slam singles titles\n16 Grand Slam doubles titles\n11 Grand Slam mixed doubles titles\nPresidential Medal of Freedom (2009)\nInternational Tennis Hall of Fame (1987)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Tennis — Singles & Doubles","era":"Legacy","teams":"","college":"","hometown":"Long Beach, California","nationality":"American","yearsActive":"1959–1983","jerseyNumber":"","espnUrl":"https://www.espn.com/tennis/player/_/id/284/billie-jean-king","instagram":"billiejeanking","initials":"Bk","slug":"billie-jean-king","proTitle":"Professional Tennis Player & Activist","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Billie_Jean_King_1977.jpg/440px-Billie_Jean_King_1977.jpg","heroImageAlt":"Billie Jean King — 39-time Grand Slam champion, founder of the WTA, and icon of gender equality in sports","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"In 1973 she founded the Women's Tennis Association, giving women players a collective voice for the first time. That same year she beat Bobby Riggs in the Battle of the Sexes before 90 million television viewers, a moment that reframed the national conversation about women in sports. She had already fought to ensure the US Open became the first Grand Slam to offer equal prize money to women.","storyRight":"King came out publicly in 1981 and has remained one of the most prominent LGBTQ+ advocates in sports history. The WTA, equal prize money, Title IX advocacy, the Billie Jean King Cup — these are her monuments. The USTA's home in New York bears her name.","_sport":""},{"fullName":"Martina Navratilova","sport":"Tennis","legend":"Yes","story":"Martina Navratilova defected from Czechoslovakia at 18 with $200 in her pocket, leaving behind family and everything she knew. What she brought with her was a game that would redefine tennis for two decades.","timeline":"1975 Defects from Czechoslovakia during the US Open\n1978 Wins first Wimbledon singles title\n1987 Wins ninth Wimbledon title — an all-time record\n1994 Retires from singles holding most career titles in Open Era\n2004 Inducted into the International Tennis Hall of Fame","awards":"Individual Awards\n18 Grand Slam singles titles\n31 Grand Slam doubles titles\n167 career singles titles (Open Era record)\nInternational Tennis Hall of Fame (2004)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Tennis — Singles & Doubles","era":"Legacy","teams":"","college":"","hometown":"Prague, Czech Republic","nationality":"American (born Czech)","yearsActive":"1973–2006","jerseyNumber":"","espnUrl":"https://www.espn.com/tennis/player/_/id/230/martina-navratilova","instagram":"martinanavratilova","initials":"Mn","slug":"martina-navratilova","proTitle":"Professional Tennis Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/32/Martina_Navratilova_1980.jpg/440px-Martina_Navratilova_1980.jpg","heroImageAlt":"Martina Navratilova — 18-time Grand Slam champion and holder of the Open Era record for most career titles","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She won 18 Grand Slam singles titles including a record nine Wimbledon championships, and 167 career titles — the most in Open Era history. Her serve-and-volley style was ahead of its time, and her physical conditioning set a new standard for professional athletes of any gender.","storyRight":"She came out publicly as bisexual in 1981 at enormous personal cost — sponsorships evaporated and the scrutiny was relentless. She played through it all and kept winning. She has since survived both breast cancer and lung cancer, and has never stopped being one of the most important LGBTQ+ voices in sports.","_sport":""},{"fullName":"Steffi Graf","sport":"Tennis","legend":"Yes","story":"Steffi Graf is the only tennis player in history — men's or women's — to complete the Golden Slam: all four Grand Slams plus Olympic gold in a single calendar year. She did it in 1988 at 19 years old.","timeline":"1987 Wins first Grand Slam title at the French Open\n1988 Completes the Golden Slam — all four majors plus Olympic gold in a single year\n1999 Retires at age 30 with 22 Grand Slam singles titles","awards":"Individual Awards\n22 Grand Slam singles titles\n377 weeks at world No. 1 (all-time record)\nOlympic Gold Medal (1988)\nOlympic Silver Medal (1992)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Tennis — Singles","era":"Legacy","teams":"","college":"","hometown":"Brühl, Germany","nationality":"German","yearsActive":"1982–1999","jerseyNumber":"","espnUrl":"https://www.espn.com/tennis/player/_/id/148/steffi-graf","instagram":"steffi_graf_official","initials":"Sg","slug":"steffi-graf","proTitle":"Professional Tennis Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/Graf_1988_Olympics.jpg/440px-Graf_1988_Olympics.jpg","heroImageAlt":"Steffi Graf at the 1988 Seoul Olympics — the only player in history to complete the Golden Slam","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Graf won 22 Grand Slam singles titles and held the world No. 1 ranking for 377 weeks — a record that still stands. Her forehand was widely considered the most devastating single shot in the history of the sport. She dominated the game for over a decade with a combination of power, precision, and an almost unshakeable competitive mentality.","storyRight":"She retired in 1999 at age 30, still ranked in the top five. She remains the standard against which every great women's player is measured.","_sport":""},{"fullName":"Venus Williams","sport":"Tennis","legend":"No","story":"Venus Williams arrived on tour as a teenager and immediately made every opponent uncomfortable. She and her sister Serena rewrote what was physically possible in women's tennis, doing it while carrying the weight of being Black women in a sport that had not historically welcomed them.","timeline":"1997 Reaches US Open final as a 17-year-old unseeded qualifier\n2000 Wins first Wimbledon and Olympic gold in singles and doubles\n2007 Advocates for equal prize money at Wimbledon — policy changes immediately\n2017 Returns from Sjogren's syndrome to reach Wimbledon final","awards":"Individual Awards\n7 Grand Slam singles titles\n14 Grand Slam doubles titles\n4x Olympic Gold Medalist","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Tennis — Singles & Doubles","era":"Legacy","teams":"","college":"","hometown":"Compton, California","nationality":"American","yearsActive":"1994–present","jerseyNumber":"","espnUrl":"https://www.espn.com/tennis/player/_/id/318/venus-williams","instagram":"venuswilliams","initials":"Vw","slug":"venus-williams","proTitle":"Professional Tennis Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/de/Venus_Williams_at_the_2009_US_Open.jpg/440px-Venus_Williams_at_the_2009_US_Open.jpg","heroImageAlt":"Venus Williams — seven-time Grand Slam champion and pioneer of equal prize money in tennis","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Venus won seven Grand Slam singles titles and four Olympic gold medals, winning Wimbledon five times. But perhaps her most lasting contribution came off the court: her personal lobbying convinced Wimbledon to offer equal prize money in 2007. She wrote the op-ed. She made the argument. She won.","storyRight":"She has continued competing into her 40s, returning from Sjogren's syndrome, an autoimmune disease that threatened to end her career, while building a fashion brand and interior design firm on the side.","_sport":""},{"fullName":"Maria Sharapova","sport":"Tennis","legend":"Yes","story":"Maria Sharapova moved from Siberia to Florida at nine years old, speaking no English, to train at Nick Bollettieri's academy. Her father came with her; her mother had to stay behind because they could not afford the plane tickets. She turned professional at 14 and won Wimbledon at 17.","timeline":"2004 Wins Wimbledon at age 17\n2006 Wins US Open, rises to world No. 1\n2012 Wins French Open, completes career Grand Slam\n2020 Retires from professional tennis","awards":"Individual Awards\n5 Grand Slam singles titles (career Grand Slam)\n5x ITF World Champion finalist","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Tennis — Singles","era":"Legacy","teams":"","college":"","hometown":"Nyagan, Russia","nationality":"Russian","yearsActive":"2001–2020","jerseyNumber":"","espnUrl":"https://www.espn.com/tennis/player/_/id/338/maria-sharapova","instagram":"mariasharapova","initials":"Ms","slug":"maria-sharapova","proTitle":"Professional Tennis Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Maria_Sharapova_2013_Wimbledon.jpg/440px-Maria_Sharapova_2013_Wimbledon.jpg","heroImageAlt":"Maria Sharapova at Wimbledon — five-time Grand Slam champion and one of ten women to complete the career Grand Slam","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Sharapova won five Grand Slam titles across all four majors — one of only ten women in history to complete the career Grand Slam. She was ranked world No. 1 five times and held the top spot for 21 weeks. She was also one of the highest-earning athletes in the world for over a decade, building a candy brand and business portfolio alongside her tennis career.","storyRight":"","_sport":""},{"fullName":"Aryna Sabalenka","sport":"Tennis","legend":"No","story":"Aryna Sabalenka turned professional in 2015 and spent years known for her massive serve but inconsistent results. That changed at the 2023 Australian Open, where she won her first major.","timeline":"2023 Wins Australian Open — first Grand Slam title\n2023 Becomes world No. 1 for the first time\n2024 Wins back-to-back Australian Open — first since Serena Williams","awards":"Individual Awards\n2x Australian Open (2023, 2024)\nWorld No. 1","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Tennis — Singles","era":"Current","teams":"","college":"","hometown":"Minsk, Belarus","nationality":"Belarusian","yearsActive":"2015–present","jerseyNumber":"","espnUrl":"https://www.espn.com/tennis/player/_/id/2628/aryna-sabalenka","instagram":"arynasabalenka","initials":"As","slug":"aryna-sabalenka","proTitle":"Professional Tennis Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Aryna_Sabalenka_%282024_Australian_Open%29.jpg/440px-Aryna_Sabalenka_%282024_Australian_Open%29.jpg","heroImageAlt":"Aryna Sabalenka at the Australian Open — world No. 1 and back-to-back Australian Open champion","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She won the Australian Open again in 2024, becoming the first player since Serena Williams to successfully defend it. She has reached the US Open final in consecutive years and become world No. 1 for the first time in 2023.","storyRight":"Sabalenka has also been one of the most candid players on tour — speaking openly about anxiety, mental health, and the grief of losing her father in 2019. She plays with ferocious intensity but has shown a self-awareness that makes her one of the most compelling figures in the sport.","_sport":""},{"fullName":"Lindsey Davenport","sport":"Tennis","legend":"Yes","story":"Lindsey Davenport was the best baseline player of her generation. She won three Grand Slam singles titles, held the world No. 1 ranking for 98 weeks, and won Olympic gold at the 1996 Atlanta Games. She reached the Australian Open final as late as 2005, retiring with a ranking still inside the top 10.","timeline":"1996 Wins Olympic gold in Atlanta\n1998 Wins US Open — first Grand Slam title\n1999 Wins Wimbledon and Australian Open, reaches world No. 1\n2014 Inducted into International Tennis Hall of Fame","awards":"Individual Awards\n3 Grand Slam singles titles\nOlympic Gold Medal (1996)\nInternational Tennis Hall of Fame (2014)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Tennis — Singles","era":"Legacy","teams":"","college":"","hometown":"Palos Verdes, California","nationality":"American","yearsActive":"1993–2010","jerseyNumber":"","espnUrl":"https://www.espn.com/tennis/player/_/id/103/lindsey-davenport","instagram":"","initials":"Ld","slug":"lindsey-davenport","proTitle":"Professional Tennis Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/81/Lindsey_Davenport.jpg/440px-Lindsey_Davenport.jpg","heroImageAlt":"Lindsey Davenport — three-time Grand Slam champion, 1996 Olympic gold medalist, and former world No. 1","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Davenport's game was deceptively simple — she hit the ball harder and more cleanly from the baseline than almost anyone in the sport's history. She was not flashy. She was relentlessly effective. In a generation defined by Williams, Graf, and Hingis, she held her own consistently enough to be remembered as one of the genuine greats.","storyRight":"","_sport":""},{"fullName":"Sloane Stephens","sport":"Tennis","legend":"No","story":"Sloane Stephens won the 2017 US Open returning from an 11-month injury after being ranked 957th in the world. She came back with a wildcard and won the whole thing without dropping a set in the final. It is one of the most extraordinary returns in the history of professional sports.","timeline":"2013 Upsets Serena Williams in the Australian Open quarterfinals\n2017 Wins US Open ranked 957th — returns from 11-month injury layoff\n2018 Reaches French Open final, peaks at world No. 3","awards":"Individual Awards\n1 Grand Slam singles title (US Open 2017)\n10 WTA singles titles","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Tennis — Singles","era":"Current","teams":"","college":"","hometown":"Plantation, Florida","nationality":"American","yearsActive":"2009–present","jerseyNumber":"","espnUrl":"https://www.espn.com/tennis/player/_/id/2476/sloane-stephens","instagram":"sloanestephens","initials":"Ss","slug":"sloane-stephens","proTitle":"Professional Tennis Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a0/Sloane_Stephens_2017_US_Open_%28cropped%29.jpg/440px-Sloane_Stephens_2017_US_Open_%28cropped%29.jpg","heroImageAlt":"Sloane Stephens at the 2017 US Open — which she won returning from an 11-month injury after being ranked 957th","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Stephens has been one of the most consistent players on the WTA tour for over a decade, reaching world No. 3 and winning ten career titles. She has been a prominent voice on racial equity in tennis and runs the Sloane Stephens Foundation supporting youth development.","storyRight":"","_sport":""},{"fullName":"Coco Gauff","sport":"Tennis","legend":"No","story":"Coco Gauff was 15 years old when she beat Venus Williams at Wimbledon in the first round. The entire tennis world immediately understood it was watching the future.","timeline":"2019 Beats Venus Williams at Wimbledon at age 15\n2022 Reaches French Open final\n2023 Wins US Open — first Grand Slam at age 19\n2024 Wins Olympic gold in doubles at Paris Games","awards":"Individual Awards\n1 Grand Slam singles title (US Open 2023)\n11 WTA titles\nOlympic Gold Medal, Doubles (2024)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Tennis — Singles & Doubles","era":"Rising","teams":"","college":"","hometown":"Delray Beach, Florida","nationality":"American","yearsActive":"2018–present","jerseyNumber":"","espnUrl":"https://www.espn.com/tennis/player/_/id/4299860/coco-gauff","instagram":"cocogauff","initials":"Cg","slug":"coco-gauff","proTitle":"Professional Tennis Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Coco_Gauff_2023_US_Open_%28cropped%29.jpg/440px-Coco_Gauff_2023_US_Open_%28cropped%29.jpg","heroImageAlt":"Coco Gauff celebrating at the 2023 US Open — first Grand Slam title at age 19","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Gauff won the 2023 US Open at 19, defeating world No. 2 Aryna Sabalenka in straight sets. She also won Olympic gold in doubles at the 2024 Paris Games.","storyRight":"Off the court, Gauff has been one of the most outspoken athletes of her generation on issues of racial justice. At 16 she gave a speech at a BLM rally in Florida that went viral. She is 20 years old and already one of the defining athletes of her era.","_sport":""},{"fullName":"Jessica Pegula","sport":"Tennis","legend":"No","story":"Jessica Pegula is the daughter of Terry Pegula, the billionaire owner of the Buffalo Bills and Buffalo Sabres. She has spent most of her career distinguishing herself entirely on her own terms.","timeline":"2021 Reaches Australian Open quarterfinal\n2022 Breaks into top 10\n2024 Reaches US Open final","awards":"Individual Awards\n9 WTA singles titles\nWorld No. 3","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Tennis — Singles","era":"Current","teams":"","college":"","hometown":"Buffalo, New York","nationality":"American","yearsActive":"2010–present","jerseyNumber":"","espnUrl":"https://www.espn.com/tennis/player/_/id/4066639/jessica-pegula","instagram":"jessicapegula","initials":"Jp","slug":"jessica-pegula","proTitle":"Professional Tennis Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/Jessica_Pegula_2024_US_Open_%28cropped%29.jpg/440px-Jessica_Pegula_2024_US_Open_%28cropped%29.jpg","heroImageAlt":"Jessica Pegula at the 2024 US Open — world No. 3 and daughter of Buffalo Bills owner","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Pegula broke into the top 10 in 2022 and has stayed there, reaching multiple Grand Slam quarterfinals and semifinals. She reached the US Open final in 2024. Her game is built on consistency, court coverage, and a two-handed backhand that is one of the most reliable shots on tour.","storyRight":"She plays with the clarity of someone who has nothing to prove and everything to enjoy — and that freedom may be part of what makes her so difficult to beat.","_sport":""},{"fullName":"Babe Didrikson Zaharias","sport":"Golf","legend":"Yes","story":"Babe Didrikson Zaharias may be the most athletically gifted person ever born in the United States. Before she became a golfer she was an Olympic sprinter and javelin thrower. At the 1932 Los Angeles Olympics she qualified for five events and won gold in the hurdles and javelin.","timeline":"1932 Wins two gold medals at the Los Angeles Olympics\n1946 Wins first US Women's Open golf title\n1950 Co-founds the LPGA\n1954 Returns from cancer surgery to win US Women's Open by 12 strokes","awards":"Individual Awards\n10 major golf titles including 3x US Women's Open\n2x Olympic Gold Medal (1932)\n6x AP Female Athlete of the Year\nAP Female Athlete of the Half Century","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Golf / Track & Field / Basketball","era":"Legacy","teams":"","college":"","hometown":"Port Arthur, Texas","nationality":"American","yearsActive":"1930–1956","jerseyNumber":"","espnUrl":"","instagram":"","initials":"Bd","slug":"babe-didrikson-zaharias","proTitle":"Professional Golfer & Multi-Sport Athlete","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Babe_Didrikson.jpg/440px-Babe_Didrikson.jpg","heroImageAlt":"Babe Didrikson Zaharias — greatest female athlete of the first half of the 20th century, Olympic champion and LPGA co-founder","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She took up golf in her late twenties and became the best female golfer in the world, winning 10 major championships including three US Women's Opens. She co-founded the LPGA in 1950.","storyRight":"In 1953 she was diagnosed with colon cancer. She had surgery and came back to win the US Women's Open the following year by 12 strokes — one of the most remarkable performances in sports history. She died in 1956 at 45. She was named AP Female Athlete of the Half Century.","_sport":""},{"fullName":"Nelly Korda","sport":"Golf","legend":"No","story":"Nelly Korda is the most dominant women's golfer in the world. The daughter of Czech tennis star Petr Korda, she turned professional in 2016 and has become virtually unstoppable at the top of the sport.","timeline":"2021 Wins Olympic gold medal in Tokyo\n2021 Wins first major — KPMG Women's PGA Championship\n2024 Wins five consecutive LPGA events","awards":"Individual Awards\n2 major titles\nOlympic Gold Medal (2021)\nWorld No. 1","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Golf","era":"Current","teams":"","college":"","hometown":"Bradenton, Florida","nationality":"American","yearsActive":"2016–present","jerseyNumber":"","espnUrl":"https://www.espn.com/golf/player/_/id/4686079/nelly-korda","instagram":"nellykorda","initials":"Nk","slug":"nelly-korda","proTitle":"Professional Golfer","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/Nelly_Korda_2023_Solheim_Cup_%28cropped%29.jpg/440px-Nelly_Korda_2023_Solheim_Cup_%28cropped%29.jpg","heroImageAlt":"Nelly Korda at the Solheim Cup — world No. 1 golfer and 2021 Olympic gold medalist","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"In 2021 she won Olympic gold at the Tokyo Games and her first major at the KPMG Women's PGA Championship. In 2024 she won five consecutive LPGA events — a streak not seen in women's golf since Annika Sorenstam.","storyRight":"At 25 she is already being spoken of in the same breath as Sorenstam as one of the great American golfers.","_sport":""},{"fullName":"Michelle Wie West","sport":"Golf","legend":"No","story":"Michelle Wie turned professional at 15 and became the most talked-about golfer in the world. She competed against men on the PGA Tour — an act of boldness that attracted intense admiration and relentless scrutiny.","timeline":"2005 Turns professional at age 15, plays PGA Tour events\n2009 Graduates from Stanford\n2014 Wins US Women's Open at age 24","awards":"Individual Awards\n1 major title (US Women's Open 2014)\n6 LPGA Tour titles","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Golf","era":"Legacy","teams":"","college":"","hometown":"Honolulu, Hawaii","nationality":"American","yearsActive":"2002–2022","jerseyNumber":"","espnUrl":"","instagram":"themichellewie","initials":"Mw","slug":"michelle-wie-west","proTitle":"Professional Golfer","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Michelle_Wie_at_2014_US_Women%27s_Open.jpg/440px-Michelle_Wie_at_2014_US_Women%27s_Open.jpg","heroImageAlt":"Michelle Wie West at the US Women's Open — which she won in 2014 at age 24","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She won the 2017 US Women's Open, her only major title, and built a career complicated by the gap between teenage expectations and professional reality. She retired in 2022 after the birth of her daughter Makenna.","storyRight":"What tends to get lost is the courage it took to do what she did at 15 — walking into men's tournaments knowing every shot would be scrutinized, and doing it anyway because she believed she belonged.","_sport":""},{"fullName":"Annika Sorenstam","sport":"Golf","legend":"Yes","story":"Annika Sorenstam is the greatest female golfer in history. She won 72 LPGA Tour events, 10 of them majors, and held the world No. 1 ranking for 60 consecutive months. In 2004 she shot 59 in competition — the lowest round ever recorded by a woman in a professional tournament.","timeline":"1995 Wins first US Women's Open\n2001 Wins 8 LPGA events in a season\n2003 Becomes first woman to play PGA Tour event since 1945\n2004 Shoots 59 — lowest round in women's professional golf history\n2008 Retires as most decorated women's golfer in history","awards":"Individual Awards\n72 LPGA Tour victories\n10 major championships\n8x LPGA Player of the Year\nWorld Golf Hall of Fame (2003)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Golf","era":"Legacy","teams":"","college":"","hometown":"Stockholm, Sweden","nationality":"Swedish","yearsActive":"1992–2008","jerseyNumber":"","espnUrl":"https://www.espn.com/golf/player/_/id/259/annika-sorenstam","instagram":"annikasorenstam","initials":"As","slug":"annika-sorenstam","proTitle":"Professional Golfer","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Annika_Sorenstam_2008.jpg/440px-Annika_Sorenstam_2008.jpg","heroImageAlt":"Annika Sorenstam — greatest female golfer in history with 72 LPGA victories and 10 major championships","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"In 2003 she played in a PGA Tour event, becoming the first woman to compete on the men's tour since Babe Zaharias in 1945. She missed the cut but showed her game was genuinely competitive at the highest level.","storyRight":"She was inducted into the World Golf Hall of Fame in 2003 while still actively competing. She is not a debated name in the conversation — she is the answer.","_sport":""},{"fullName":"Michele Smith","sport":"Softball","legend":"Yes","story":"Michele Smith was one of the most dominant pitchers in women's softball history. A two-time Olympic gold medalist with Team USA in 1996 and 2000, she was renowned for her devastating riseball and her ability to perform under pressure at the highest level.","timeline":"1996 Wins Olympic gold medal in Atlanta\n2000 Wins Olympic gold medal in Sydney\n2004 Retires from playing career","awards":"Individual Awards\nMultiple All-American honors\nTeam & Competition\n2x Olympic Gold Medal (1996, 2000)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Pitcher","era":"Legacy","teams":"","college":"","hometown":"Park Ridge, Illinois","nationality":"American","yearsActive":"1990–2004","jerseyNumber":"5","espnUrl":"","instagram":"","initials":"Ms","slug":"michele-smith","proTitle":"Softball Pitcher & Broadcaster","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Michele_Smith_Olympian.jpg/440px-Michele_Smith_Olympian.jpg","heroImageAlt":"Michele Smith — two-time Olympic gold medalist and one of the most dominant softball pitchers of her era","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She pitched professionally in Japan, where she was treated as a star athlete, and later became one of the most respected analysts in softball, working for ESPN and NBC Sports.","storyRight":"Smith's combination of technical brilliance and competitive fire made her the standard for the generation of pitchers who came after her.","_sport":""},{"fullName":"Jessica Mendoza","sport":"Softball","legend":"Yes","story":"Jessica Mendoza was a four-time All-American at Stanford and a two-time Olympic medalist — gold in Athens in 2004, silver in Beijing in 2008. She was one of the most complete hitters and outfielders of her generation.","timeline":"2004 Wins Olympic gold medal in Athens\n2008 Wins Olympic silver medal in Beijing\n2015 Becomes first woman to analyze ESPN Sunday Night Baseball\n2016 Named full-time ESPN Sunday Night Baseball analyst","awards":"Individual Awards\n4x All-American, Stanford\nTeam & Competition\nOlympic Gold Medal (2004)\nOlympic Silver Medal (2008)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Outfielder","era":"Legacy","teams":"","college":"","hometown":"Camarillo, California","nationality":"American","yearsActive":"2001–2010","jerseyNumber":"6","espnUrl":"","instagram":"jessicamendoza","initials":"Jm","slug":"jessica-mendoza","proTitle":"Softball Player & Broadcaster","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Jessica_Mendoza.jpg/440px-Jessica_Mendoza.jpg","heroImageAlt":"Jessica Mendoza — two-time Olympic medalist and first woman to serve as ESPN Sunday Night Baseball analyst","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"In 2015 she became the first woman to serve as a guest analyst on ESPN's Sunday Night Baseball — a woman analyzing men's baseball at the highest level of sports media. She became a full-time voice on MLB coverage, breaking a barrier that had stood as long as the sport had been on television.","storyRight":"","_sport":""},{"fullName":"Cat Osterman","sport":"Softball","legend":"Yes","story":"Cat Osterman may be the most unhittable softball pitcher who ever lived. Her riseball moved late and moved a lot. At the University of Texas she set NCAA records for strikeouts and won multiple player of the year awards.","timeline":"2004 Wins Olympic gold medal in Athens\n2008 Wins Olympic silver medal in Beijing\n2019 Returns to national team at age 35\n2021 Competes at Tokyo Olympics at age 37","awards":"Individual Awards\n3x USA Softball Player of the Year\nTeam & Competition\nOlympic Gold Medal (2004)\nOlympic Silver Medal (2008)\nOlympic Bronze Medal (2021)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Pitcher","era":"Legacy","teams":"","college":"","hometown":"Houston, Texas","nationality":"American","yearsActive":"2004–2021","jerseyNumber":"8","espnUrl":"","instagram":"catosterman","initials":"Co","slug":"cat-osterman","proTitle":"Softball Pitcher","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Cat_Osterman.jpg/440px-Cat_Osterman.jpg","heroImageAlt":"Cat Osterman — two-time Olympic medalist and one of the most unhittable softball pitchers in history","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She won Olympic gold in Athens in 2004 and silver in Beijing in 2008. She retired, came back, retired again, then came back to make the Tokyo Olympics team at 37 because she could still compete at the highest level and there was a team that wanted her.","storyRight":"Her return to competition at an older age gave the next generation a visible example of what it looks like to refuse to accept that a career has to end on someone else's schedule.","_sport":""},{"fullName":"Lisa Fernandez","sport":"Softball","legend":"Yes","story":"Lisa Fernandez is perhaps the most complete softball player who has ever competed. At UCLA she dominated both as a pitcher — throwing a perfect game in the College World Series — and as a hitter. She is one of the only players in the sport who could single-handedly control a game from both the mound and the plate.","timeline":"1996 Wins Olympic gold — first time softball is in the Olympics\n2000 Wins Olympic gold in Sydney\n2004 Wins Olympic gold in Athens\n2006 Inducted into the ASA Hall of Fame","awards":"Individual Awards\nASA Hall of Fame\nTeam & Competition\n3x Olympic Gold Medal (1996, 2000, 2004)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Pitcher / Third Base","era":"Legacy","teams":"","college":"","hometown":"Long Beach, California","nationality":"American","yearsActive":"1991–2004","jerseyNumber":"16","espnUrl":"","instagram":"","initials":"Lf","slug":"lisa-fernandez","proTitle":"Softball Pitcher","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Lisa_Fernandez.jpg/440px-Lisa_Fernandez.jpg","heroImageAlt":"Lisa Fernandez — three-time Olympic gold medalist and greatest pitcher-hitter combination in softball history","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She won three consecutive Olympic gold medals: Atlanta 1996, Sydney 2000, and Athens 2004. In those three Games she compiled a combined ERA of 0.12 and struck out batters at a rate that defied ordinary statistics.","storyRight":"Fernandez remains the standard against which pitchers are measured.","_sport":""},{"fullName":"Jocelyn Alo","sport":"Softball","legend":"No","story":"Jocelyn Alo left the University of Oklahoma in 2022 as the all-time home run leader in NCAA Division I softball history with 122 career home runs. She broke Lauren Chamberlain's record with a swing in the Women's College World Series that was simultaneously the most anticipated and the most inevitable moment in the tournament's recent history.","timeline":"2019 Arrives at Oklahoma as the nation's top recruit\n2022 Breaks NCAA Division I all-time home run record\n2022 Finishes career with 122 home runs","awards":"Individual Awards\n3x Big 12 Player of the Year\nNCAA Division I all-time home run leader (122)\nTeam & Competition\n2x NCAA Champion with Oklahoma","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Outfielder","era":"Rising","teams":"","college":"","hometown":"Ewa Beach, Hawaii","nationality":"American","yearsActive":"2022–present","jerseyNumber":"14","espnUrl":"","instagram":"jocelynalo","initials":"Ja","slug":"jocelyn-alo","proTitle":"Professional Softball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Jocelyn_Alo_2022.jpg/440px-Jocelyn_Alo_2022.jpg","heroImageAlt":"Jocelyn Alo of Oklahoma — NCAA Division I all-time home run record holder with 122 career home runs","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Alo grew up in Ewa Beach, Hawaii, the daughter of Samoan parents who moved to the mainland so she could compete at the highest level. She is physically unlike most softball outfielders — more powerful than almost anyone who has played her position — and she used that power with complete consistency across four seasons at Oklahoma.","storyRight":"","_sport":""},{"fullName":"Natasha Watley","sport":"Softball","legend":"Yes","story":"Natasha Watley was the engine of the USA Softball teams that dominated international competition in the 2000s. The fastest player in the sport, she set the tone at the top of the lineup — getting on base, stealing bases, and manufacturing runs at a rate that gave every pitcher more room to work with.","timeline":"2004 Wins Olympic gold medal in Athens\n2008 Wins Olympic silver medal in Beijing","awards":"Individual Awards\n3x All-American, UCLA\nTeam & Competition\nOlympic Gold Medal (2004)\nOlympic Silver Medal (2008)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Shortstop","era":"Legacy","teams":"","college":"","hometown":"Los Angeles, California","nationality":"American","yearsActive":"2001–2012","jerseyNumber":"7","espnUrl":"","instagram":"natashawatley","initials":"Nw","slug":"natasha-watley","proTitle":"Softball Player & Advocate","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e2/Natasha_Watley.jpg/440px-Natasha_Watley.jpg","heroImageAlt":"Natasha Watley — two-time Olympic medalist and fastest base runner in USA Softball history","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She won gold at the 2004 Athens Olympics and silver at the 2008 Beijing Games, and has spent her post-playing career as one of the sport's most consistent advocates for diversity and access in communities that have historically been underserved by softball infrastructure.","storyRight":"","_sport":""},{"fullName":"Rachel Garcia","sport":"Softball","legend":"No","story":"Rachel Garcia is one of the most decorated players in UCLA softball history and one of the most important pitchers on the current USA Softball team. She won two Honda Awards, two Women's College World Series titles, and a gold medal at the Tokyo Olympics.","timeline":"2019 Wins Women's College World Series with UCLA\n2021 Wins Olympic gold medal at Tokyo Games","awards":"Individual Awards\n2x Honda Award\n2x All-American\nTeam & Competition\n2x NCAA Champion\nOlympic Gold Medal (2021)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Pitcher","era":"Current","teams":"","college":"","hometown":"Palmdale, California","nationality":"American","yearsActive":"2018–present","jerseyNumber":"18","espnUrl":"","instagram":"rachelbgarcia","initials":"Rg","slug":"rachel-garcia","proTitle":"Softball Pitcher","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Rachel_Garcia.jpg/440px-Rachel_Garcia.jpg","heroImageAlt":"Rachel Garcia — Olympic gold medalist and one of the most decorated two-way players in softball history","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"Garcia's combination of pitching ability and bat — she hit .389 in 2021 with Team USA — makes her one of the two-way threats the sport rarely produces. She served in the Army Reserve while competing at Olympic level, a commitment that reflects values that go well beyond softball.","storyRight":"","_sport":""},{"fullName":"Monica Abbott","sport":"Softball","legend":"No","story":"Monica Abbott holds the record for the fastest recorded pitch in softball history at 77 mph. She is 6'3\", lefthanded, and throws with a combination of velocity and late movement that has baffled elite hitters for nearly two decades.","timeline":"2008 Wins Olympic silver medal in Beijing\n2016 Named to USA Softball Hall of Fame","awards":"Individual Awards\nJapan professional softball record holder for wins\nTeam & Competition\nOlympic Silver Medal (2008)\nOlympic Bronze Medal (2021)","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Pitcher","era":"Current","teams":"","college":"","hometown":"Salinas, California","nationality":"American","yearsActive":"2007–present","jerseyNumber":"21","espnUrl":"","instagram":"monicaabbott21","initials":"Ma","slug":"monica-abbott","proTitle":"Softball Pitcher","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Monica_Abbott.jpg/440px-Monica_Abbott.jpg","heroImageAlt":"Monica Abbott — 6'3\" lefthanded pitcher and the fastest recorded throw in softball history at 77 mph","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She won the Olympic silver medal in Beijing in 2008 and has remained dominant in international competition ever since, also holding the Japanese professional softball record for wins. She has been one of the sport's most outspoken advocates for professional opportunities and pay equity for women softball players.","storyRight":"","_sport":""},{"fullName":"Maya Brady","sport":"Softball","legend":"No","story":"Maya Brady is the niece of Tom Brady and the daughter of former NFL wide receiver Brian Tyms. She grew up around professional athletes and developed her own game entirely on its own terms, becoming one of the most versatile and athletic players in UCLA softball history.","timeline":"2022 Named All-American at UCLA for the first time\n2024 Named All-American for the second time, graduates from UCLA","awards":"Individual Awards\n2x All-American at UCLA","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Outfielder","era":"Rising","teams":"","college":"","hometown":"Los Angeles, California","nationality":"American","yearsActive":"2022–present","jerseyNumber":"6","espnUrl":"","instagram":"mayabrady","initials":"Mb","slug":"maya-brady","proTitle":"Professional Softball Player","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Maya_Brady_%282022%29.jpg/440px-Maya_Brady_%282022%29.jpg","heroImageAlt":"Maya Brady of UCLA — Tom Brady's niece and two-time All-American softball outfielder","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She was a two-time All-American at UCLA, known for her combination of speed, arm strength, and versatility. She has been thoughtful and deliberate about building an identity as a softball player first — and has succeeded.","storyRight":"","_sport":""},{"fullName":"Montana Fouts","sport":"Softball","legend":"No","story":"Montana Fouts grew up in Grayson, Kentucky and became one of the most recruited pitchers in the country before choosing Alabama. She threw three no-hitters in a single season — a feat almost unheard of at the collegiate level — and led Alabama to multiple Women's College World Series appearances.","timeline":"2021 Throws three no-hitters in a single season at Alabama\n2022 Named to USA Softball national team\n2022 Enters professional softball","awards":"Individual Awards\nMultiple All-American honors at Alabama\nSEC Pitcher of the Year","wikiUrl":"","wikiPhoto":"","gettyUrl":"","position":"Pitcher","era":"Rising","teams":"","college":"","hometown":"Grayson, Kentucky","nationality":"American","yearsActive":"2022–present","jerseyNumber":"14","espnUrl":"","instagram":"montanafouts","initials":"Mf","slug":"montana-fouts","proTitle":"Softball Pitcher","heroImageUrl":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Montana_Fouts_%282022%29.jpg/440px-Montana_Fouts_%282022%29.jpg","heroImageAlt":"Montana Fouts of Alabama — one of the most dominant college softball pitchers of her era, with three no-hitters in a single season","heroImageCredit":"","heroImageCreditSource":"Wikipedia / Wikimedia","heroImageCreditOther":"","storyLeft":"She thro
